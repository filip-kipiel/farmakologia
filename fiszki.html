<head>

<title>Fiszki — Farmakologia weterynaryjna</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    margin: 0; padding: 0; color: #222;
    background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
  }
  a.back { align-self: flex-start; margin: 16px 0 0 18px; color: #cfd8dc; text-decoration: none; font-weight: 600; font-size: 0.95em; }
  a.back:hover { color: #fff; }
  header { text-align: center; color: #fff; padding: 18px 20px 6px 20px; max-width: 900px; }
  header h1 { font-size: 1.8em; margin: 0 0 6px 0; }
  header p { color: #cfd8dc; margin: 4px 0; font-size: 0.98em; }

  .filters { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; padding: 14px 16px 4px; }
  .filter {
    border: 2px solid rgba(255,255,255,0.5); background: transparent; color: #fff;
    padding: 7px 14px; border-radius: 20px; cursor: pointer; font-size: 0.88em; font-weight: 600;
    transition: all 0.15s ease;
  }
  .filter:hover { border-color: #fff; }
  .filter.active { background: #fff; color: #2c3e50; border-color: #fff; }

  .stage { width: 100%; max-width: 720px; padding: 18px 18px 50px; flex: 1; display: flex; flex-direction: column; }

  .counter { text-align: center; color: #aebfc9; font-size: 0.85em; margin-bottom: 10px; }

  .card {
    background: #fff; border-radius: 16px; box-shadow: 0 10px 34px rgba(0,0,0,0.32);
    border-top: 8px solid var(--accent, #2980b9);
    padding: 0; overflow: hidden; display: flex; flex-direction: column;
    min-height: 320px;
  }
  .card-head { padding: 26px 26px 8px; }
  .badge {
    display: inline-block; background: var(--accent, #2980b9); color: #fff;
    font-size: 0.74em; font-weight: 700; padding: 4px 11px; border-radius: 20px; letter-spacing: 0.4px;
  }
  .drug-name { font-size: 2.0em; color: #2c3e50; margin: 14px 0 4px; line-height: 1.15; }
  .drug-sub { color: #7f8c8d; font-size: 0.9em; font-weight: 600; }

  .answer { padding: 6px 26px 8px; }
  .answer.hidden { display: none; }
  .prop { padding: 9px 0; border-top: 1px solid #eef1f3; font-size: 0.95em; line-height: 1.45; }
  .prop:first-child { border-top: none; }
  .prop b { color: var(--accent, #2980b9); display: block; font-size: 0.78em; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 2px; }

  .reveal-hint { flex: 1; display: flex; align-items: center; justify-content: center; color: #95a5a6; font-style: italic; padding: 20px; text-align: center; }
  .reveal-hint.hidden { display: none; }

  .controls { padding: 18px 18px 0; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn {
    border: none; cursor: pointer; font-weight: 700; font-size: 1em;
    padding: 13px 26px; border-radius: 10px; transition: filter 0.15s ease, transform 0.1s ease;
  }
  .btn:active { transform: translateY(1px); }
  .btn-primary { background: #fff; color: #2c3e50; }
  .btn-primary:hover { filter: brightness(0.94); }
  .btn-accent { background: var(--accent, #2980b9); color: #fff; }
  .btn-accent:hover { filter: brightness(1.1); }

  .empty { color: #fff; text-align: center; padding: 40px; }
  footer { color: #8ea1ad; font-size: 0.8em; text-align: center; padding: 8px 20px 30px; }
  kbd { background: rgba(255,255,255,0.15); border-radius: 4px; padding: 1px 6px; color: #fff; font-size: 0.85em; }
</style>
</head>

sta μ, agonista κ","Skutek":"zwężenie źrenicy, sedacja, dysforia, analgezja (4-7× morfiny)","Zastosowanie":"przeciwbólowy, premedykacja, przeciwwymiotny, przeciwkaszlowy, bóle morzyskowe","Przeciwwskazania":"schorzenia wątroby, pacjenci geriatryczni i wyniszczeni, niedoczynność tarczycy, choroba Addisona, niewydolność nerek, urazy głowy","Działania niepożądane":"depresja oddechowa, ataksja, niezborność ruchów, brak apetytu, biegunki"}},{"n":"pentazocyna","k":1,"g":"OPIOIDY: agoniści/antagoniści częściowi + pozostałe","p":{"Grupa":"agonista rec. κ","Skutek":"słabe przeciwbólowe (0.3-0.5× morfiny), słabe uspokajające, objawy psychozomimetyczne, omamy, dysforia","Zastosowanie":"przeciwbólowa (u psów, koni, kotów, i.m.)","Działania niepożądane":"zawroty głowy, senność, nudności, wymioty, zaparcia, niepokój, drgawki, hipotensja, tachykardia, depresja oddechowa, uzależnienie","Dodatkowe":"NIE zwęża źrenic; słabszy wpływ na przewód pokarmowy, nie powoduje wymiotów"}},{"n":"tramadol","k":1,"g":"OPIOIDY: agoniści/antagoniści częściowi + pozostałe","p":{"Grupa":"słaby agonista μ + hamuje wychwyt NA i 5-HT","Skutek":"przeciwbólowe (0.1× morfiny), sedacja","Zastosowanie":"ból przewlekły","Działania niepożądane":"ślinienie, wymioty, sedacja, drgawki","Dodatkowe":"skuteczność u psów wątpliwa (słaba biodostępność, brak aktywnego metabolitu)"}},{"n":"nalorfina, lewalorfan","k":1,"g":"OPIOIDY: antagoniści + nieopioidowe przeciwbólowe (koanalgetyki)","p":{"Mechanizm":"antagoniści o słabych właściwościach agonistycznych; znoszą działanie czystych agonistów","Zastosowanie":"znoszą depresję oddechową","Dodatkowe":"nie używane analgetycznie (dysforia — wrażliwe koty i konie)"}},{"n":"nalokson, naltrekson","k":1,"g":"OPIOIDY: antagoniści + nieopioidowe przeciwbólowe (koanalgetyki)","p":{"Mechanizm":"antagoniści rec. μ (1 i 2 grupa); znoszą działanie leków gr. 1 i 2","Zastosowanie":"znoszą depresję oddechową, zwężenie źrenic, działanie przeciwbólowe; zatrucia/przedawkowanie; leczenie zacho a, wstrząs kardiogenny, astma","Działania niepożądane":"bradykardia, skurcz oskrzeli, zawroty głowy"}},{"n":"Powinowactwo","k":1,"g":"Podstawy farmakologii (farmakokinetyka / farmakodynamika)","p":{"Definicja":"zdolność leku do wiązania z receptorem; im wyższe powinowactwo, tym niższe Ka (stężenie wiążące 50% receptorów)"}},{"n":"Tachyfilaksja","k":1,"g":"Podstawy farmakologii (farmakokinetyka / farmakodynamika)","p":{"Definicja":"osłabienie działania leku w krótkim czasie (gł. leki działające na receptory)"}},{"n":"Tolerancja","k":1,"g":"Podstawy farmakologii (farmakokinetyka / farmakodynamika)","p":{"Definicja":"osłabienie działania po długotrwałym stosowaniu (zmiany w receptorach, ↓ liczby receptorów, wyczerpanie przekaźników, ↑ metabolizmu, adaptacja)"}},{"n":"Up-regulacja (sensytyzacja)","k":1,"g":"Podstawy farmakologii (farmakokinetyka / farmakodynamika)","p":{"Definicja":"długotrwałe stosowanie antagonistów → nadwrażliwość i wzrost liczby receptorów"}},{"n":"Down-regulacja (desensytyzacja)","k":1,"g":"Podstawy farmakologii (farmakokinetyka / farmakodynamika)","p":{"Definicja":"długotrwałe stosowanie agonistów → odwrażliwienie / ↓ liczby receptorów"}},{"n":"Indeks terapeutyczny","k":1,"g":"Podstawy farmakologii (farmakokinetyka / farmakodynamika)","p":{"Definicja":"LD50/ED50 (ED50 — efekt u 50% osobników; LD50 — śmierć 50% osobników)"}},{"n":"Idiosynkrazja","k":1,"g":"Podstawy farmakologii (farmakokinetyka / farmakodynamika)","p":{"Definicja":"ostre zatrucie po podaniu dawki terapeutycznej"}},{"n":"Receptory metabotropowe","k":1,"g":"Podstawy farmakologii (farmakokinetyka / farmakodynamika)","p":{"Definicja":"białko G → fosfolipaza C → IP3 (↑ Ca²⁺) + DAG; M1/M3, adrenergiczne, opioidowe (μ/κ/δ), adenozynowe, dopaminowe, histaminowe, serotoninowe (poza 5-HT3), GABA-B"}},{"n":"Receptory jonotropowe","k":1,"g":"Podstawy farmakologii (farmakokinetyka / farmakodynamika)","p":{"Definicja":"kanały jonowe: nikotynowe, glutaminergiczne (NMDA), GABA-A (postsynaptyczny), 5-HT3"}},{"n":"Synergizm addycyjny / hiperaddycyjny","k":1,"g":"Podstawy farmakologii (farmakokinetyka / farmakodynamika)","p":{"Definicja":"addycyjny — efekt = suma (ten sam punkt uchwytu); hiperaddycyjny — efekt > suma (różny punkt uchwytu, ten sam kierunek)"}},{"n":"Antagonizm","k":1,"g":"Podstawy farmakologii (farmakokinetyka / farmakodynamika)","p":{"Definicja":"konkurencyjny (ten sam punkt uchwytu) / niekonkurencyjny (inne punkty uchwytu) / funkcjonalny / chemiczny"}},{"n":"enalapril","k":2,"g":"Niewydolność serca: inhibitory ACE i sartany (układ R-A-A)","p":{"Grupa":"inhibitor konwertazy angiotensyny (ACE-I)","Mechanizm":"hamuje przekształcenie angiotensyny I w II → hamowanie uwalniania aldosteronu (zatrzymanie sodu i wody) + zaburzona degradacja kinin","Skutek":"rozszerzenie naczyń krwionośnych, zmniejszenie zastoju krwi, ↓ ciśnienia tętniczego","Zastosowanie":"nadciśnienie, zastoinowa niewydolność serca","Przeciwwskazania":"ciąża i laktacja (teratogenny)","Niepożądane":"hipotensja, biegunka, brak apetytu, kaszel, obrzęk naczynioruchowy, ataksja, apatia, zmiany skórne i behawioralne, zaburzenia hematologiczne","Dodatkowe":"osoczowy"}},{"n":"ramipril, benazepril","k":2,"g":"Niewydolność serca: inhibitory ACE i sartany (układ R-A-A)","p":{"Grupa":"ACE-I","Mechanizm":"hamuje przekształcenie angiotensyny I w II → hamowanie uwalniania aldosteronu (zatrzymanie sodu i wody) + zaburzona degradacja kinin","Skutek":"rozszerzenie naczyń krwionośnych, zmniejszenie zastoju krwi, ↓ ciśnienia tętniczego","Zastosowanie":"nadciśnienie, zastoinowa niewydolność serca","Przeciwwskazania":"ciąża i laktacja (teratogenny)","Niepożądane":"hipotensja, biegunka, brak apetytu, kaszel, obrzęk naczynioruchowy, ataksja, apatia, zmiany skórne i behawioralne, zaburzenia hematologiczne","Dodatkowe":"tkankowy (najważniejszy); benazepril eliminowany przez nerki i wątrobę"}},{"n":"imidapril","k":2,"g":"Niewydolność serca: inhibitory ACE i sartany (układ R-A-A)","p":{"Grupa":"ACE-I","Mechanizm  wczesny okres po zawale","Niepożądane":"bradykardia, wymioty, biegunka, apatia, senność, bloki serca, arytmie, migotanie komór","Dodatkowe":"tylko dla psów; działa długo; szybko i dobrze wchłania się z pp; stałe stężenie po 1–2 dniach (dawka nasycająca)"}},{"n":"proscylarydyna, strofantyna G","k":2,"g":"Glikozydy nasercowe (NAPARSTNICA)","p":{"Zastosowanie":"ostra niewydolność serca, migotanie przedsionków","Przeciwwskazania":"zaburzenia rytmu z bradykardią, bloki serca, zaburzenia rytmu pochodzenia komorowego, kardiomiopatia przerostowa, wczesny okres po zawale","Niepożądane":"bradykardia, wymioty, biegunka, apatia, senność, bloki serca, arytmie, migotanie komór","Dodatkowe":"strofantyna G: działa szybko i krótko, NIE wchłania się z pp — podawana dożylnie w ostrej niewydolności serca"}},{"n":"pimobendan","k":2,"g":"Leki inotropowe (+): inhibitory PDE3, β-adrenomimetyki, atropina","p":{"Grupa":"inhibitor PDE3 (inodilator)","Mechanizm":"hamuje fosfodiesterazę 3 → ↑ stężenie cAMP; zwiększa wrażliwość mięśnia sercowego na wapń (sensytyzator wapnia)","Skutek":"inotropowo (+), rozkurcza naczynia krwionośne (↓ opór obwodowy)","Zastosowanie":"zastoinowa niewydolność serca u psów; przy kardiomiopatii rozstrzeniowej","Dodatkowe":"skuteczny, bezpieczny, niezbyt arytmogenny; skuteczny we wtórnym nadciśnieniu płucnym od choroby zwyrodnieniowej (degeneracyjnej) płatków zastawki dwudzielnej"}},{"n":"amrinon, milrinon","k":2,"g":"Leki inotropowe (+): inhibitory PDE3, β-adrenomimetyki, atropina","p":{"Grupa":"inhibitory PDE3","Mechanizm":"rozkładają cAMP do 5-AMP — silniejsze od pimobendanu","Skutek":"inotropowo (+), niewielki chronotropowy (+), ↓ zużycia tlenu","Zastosowanie":"w ostrej niewydolności serca (dożylnie)","Dodatkowe":"arytmogenne, ↑ śmiertelności — stosowane doraźnie, NIE przewlekle"}},{"n":"dopamina","k":2,"g":"Leki inotropowe (+): inhibitory PDE3, β-adrenomimetyki, atropina","p":{"Grupa":"β-adrenomimetyk (amina katecholowa)","Mechanizm":"agonista rec. β → pobudzenie czynności serca; wpływa na rec. D w nerkach i naczyniach → ↑ cAMP → rozszerzenie naczyń","Skutek":"efekt inotropowy (+)","Zastosowanie":"leczenie niewydolności serca, wstrząs kardiogenny i septyczny","Dodatkowe":"agoniści β1 = pobudzenie serca, zniesienie bloków"}},{"n":"dobutamina","k":2,"g":"Leki inotropowe (+): inhibitory PDE3, β-adrenomimetyki, atropina","p":{"Grupa":"β-adrenomimetyk","Mechanizm":"agonista rec. β1 → ↑ cAMP","Skutek":"efekt inotropowy (+)","Zastosowanie":"krótkotrwałe leczenie niewydolności serca"}},{"n":"atropina","k":2,"g":"Leki inotropowe (+): inhibitory PDE3, β-adrenomimetyki, atropina","p":{"Grupa":"parasympatykolityk","Mechanizm":"blokada rec. muskarynowych → przyspieszenie pracy serca","Skutek":"↑ częstości pracy serca","Zastosowanie":"bradykardia, bloki serca","Dodatkowe":"podawana parenteralnie, przechodzi przez barierę krew-mózg; butylobromek skopolaminy — doustnie, NIE przechodzi bariery"}},{"n":"epoprostenol, treprostynil, iloprost","k":2,"g":"Nadciśnienie płucne: prostacykliny, antagoniści endoteliny, inhibitory PDE5","p":{"Grupa":"analogi prostacyklin","Mechanizm":"rozszerzają naczynia i hamują aktywność płytek krwi; ograniczają proliferację komórek","Skutek":"↑ objętość minutową serca, rozszerzenie naczyń","Zastosowanie":"nadciśnienie płucne, niewydolność prawej komory serca","Dodatkowe":"podawane inhalacyjnie"}},{"n":"bosentan, sytaksentan, ambrisentan","k":2,"g":"Nadciśnienie płucne: prostacykliny, antagoniści endoteliny, inhibitory PDE5","p":{"Grupa":"antagoniści endoteliny","Mechanizm":"endotelina-1 powoduje skurcz naczyń, proliferację komórek mięśni gładkich i przebudowę naczyń — lek hamuje jej działanie (rec. ETA, ETB); działa na śródbłonek przy niedokrwieniu","Skutek":"ograniczenie przebudowy komór serca, zahamowanie skurczu i przebudowy naczyń, poprawa parametrów hemodynamicznych i perfuzji nerkowej u psów","Zastosowanie":"nadciśnienie płucne","Dodatkowe":"doustnie"}},{"n":"syldenafil, tadalafil, wardenafil","k":2,"g":"Nadciśnienie płucne: prostacykliny, antagoniści endoteliny, inhibitory PDE5","p":{"Grupa":"inhibitory PDE5","Mechanizm":"hamowanie fosfodiesterazy 5 (występuje w dużym stężeniu w naczyniach krążenia płucnego) → ↑ cGMP → rozszerzenie naczyń, ↓ ciśnienia tętniczego","Skutek":"rozszerzenie naczyń","Zastosowanie":"nadciśnienie płucne","Dodatkowe":"syldenafil — lek z wyboru; krótko działający; stosowany też do zaburzeń erekcji; DN: zaczerwienienie skóry, ze strony pp"}},{"n":"teofilina","k":2,"g":"Nadciśnienie płucne: prostacykliny, antagoniści endoteliny, inhibitory PDE5","p":{"Grupa":"inhibitor PDE5 (nieselektywny PDE3, 4, 5)","Mechanizm":"nieselektywny inhibitor PDE3, PDE4 i PDE5 → rozluźnia mięśnie gładkie oskrzeli","Skutek":"rozkurcz oskrzeli","Zastosowanie":"choroby oskrzeli, astma","Dodatkowe":"(patrz też leki przeciwastmatyczne)"}},{"n":"nifedypina, amlodypina","k":2,"g":"Wazodylatatory: blokery kanałów Ca²⁺, azotany, leki hipotensyjne","p":{"Grupa":"blokery kanałów wapniowych (dihydropirydyny)","Mechanizm":"blokują potencjałozależne kanały wapniowe w mięśniach gładkich naczyń → rozszerzenie naczyń","Skutek":"spadek siły skurczu, działanie inotropowe (−)","Zastosowanie":"amlodypina — leczenie nadciśnienia","Niepożądane":"hipotensja, osłabienie kurczliwości"}},{"n":"diltiazem, werapamil","k":2,"g":"Wazodylatatory: blokery kanałów Ca²⁺, azotany, leki hipotensyjne","p":{"Grupa":"blokery kanałów wapniowych","Mechanizm":"blokują kanały wapniowe w mięśniach gładkich naczyń i mięśniu sercowym → ↓ przewodzenia, ↓ częstotliwości","Skutek":"chrono-, dromo-, inotropowy (−)","Zastosowanie":"arytmie serca, choroba niedokrwienna serca, HCM u kotów","Niepożądane":"NIE WOLNO przy niewydolności serca"}},{"n":"nitrogliceryna, diazotan/izosorbid (azotany i azotyny)","k":2,"g":"Wazodylatatory: blokery kanałów Ca²⁺, azotany, leki hipotensyjne","p":{"Grupa":"azotany i azotyny","Mechanizm":"po przejściu do wnętrza komórki odłączają jon azotynowy → powstaje tlenek azotu (NO) → aktywuje cyklazę guanylową → ↑ cGMP (NO powstaje z L-argininy w śródbłonku, podawany egzogennie trafia prosto do mięśniówki)","Skutek":"rozkurcz mięśni gładkich naczyń, spadek ciśnienia, rozszerzenie naczyń wieńcowych","Zastosowanie":"leki pomocnicze w ostrej niewydolności serca","Niepożądane":"pod język (efekt pierwszego przejścia) — dobrze wchłania się przez śluzówki; bardzo szybko obniża ciśnienie"}},{"n":"Ia","k":2,"g":"Leki antyarytmiczne (klasyfikacja Vaughana-Williamsa)","p":{"Leki":"chinidyna","Grupa / mechanizm":"leki stabilizujące błony komórkowe — blokują potencjałozależne kanały sodowe","Zastosowanie":"arytmie nadkomorowe i komorowe","Dodatkowe":"i.v. lub p.o."}},{"n":"Ib","k":2,"g":"Leki antyarytmiczne (klasyfikacja Vaughana-Williamsa)","p":{"Leki":"lidokaina, fenytoina","Grupa / mechanizm":"jw. (kanały sodowe)","Zastosowanie":"arytmie komorowe","Dodatkowe":"lidokaina = znieczulenie miejscowe; i.v."}},{"n":"Ic","k":2,"g":"Leki antyarytmiczne (klasyfikacja Vaughana-Williamsa)","p":{"Leki":"propafenon","Grupa / mechanizm":"jw. (kanały sodowe)","Zastosowanie":"arytmie nadkomorowe i komorowe","Dodatkowe":"i.v., p.o."}},{"n":"II","k":2,"g":"Leki antyarytmiczne (klasyfikacja Vaughana-Williamsa)","p":{"Leki":"propranolol, atenolol, metoprolol, karwedilol","Grupa / mechanizm":"β-adrenolityki — zmniejszenie automatyzmu i zahamowanie przewodnictwa","Zastosowanie":"arytmie nadkomorowe i komorowe","Dodatkowe":"lepsze wypełnienie krwią, poprawa przepływu wieńcowego; zapobiega włóknieniu przedsionków"}},{"n":"III","k":2,"g":"Leki antyarytmiczne (klasyfikacja Vaughana-Williamsa)","p":{"Leki":"amiodaron, sotalol","Grupa / mechanizm":"zwiększające czas trwania potencjału — blokowanie kanałów potasowych; działają też jak β-blokery + agonista kanałów K⁺","Zastosowanie":"arytmie komorowe","Dodatkowe":"i.v., p.o.; działają inotropowo (−); amiodaron: hepatotoksyczność, niedoczynność tarczycy"}},{"n":"IV","k":2,"g":"Leki antyarytmiczne (klasyfikacja Vaughana-Williamsa)","p":{"Leki":"werapamil, diltiazem","Grupa / mechanizm":"blokery kanałów wapniowych","Zastosowanie":"arytmie nadkomorowe, przewlekłe migotanie przedsionków, kardiomiopatia przerostowa u kotów, poprawa przepływu wieńcowego","Dodatkowe":"mniejsze działanie inotropowe (−), częściej stosowane"}},{"n":"acetazolamid, metazolamid, dichlorfenamid","k":2,"g":"DIURETYKI","p":{"Grupa":"inhibitory anhydrazy węglanowej (IAW)","Mechanizm":"hamowanie anhydrazy węglanowej w kanalikach proksymalnych → ↓ jonów wodoru w komórkach kanalików → ↑ objętości moczu (więcej Na⁺, K⁺, HCO₃⁻)","Zastosowanie":"jaskra, obrzęki pochodzenia sercowego, obrzęki wymienia, padaczka, alkaloza metaboliczna; alkalizacja moczu przy kamicy","Przeciwwskazania":"choroby wątroby, kwasica","Niepożądane":"hipokaliemia, kwasica metaboliczna, wymioty przy podaniu dożołądkowym","Dodatkowe":"niewielka siła działania; zmniejszają rezerwy alkaliczne krwi"}},{"n":"furosemid, kwas etakrynowy, bumetanid, piretanid, torasemid","k":2,"g":"DIURETYKI","p":{"Grupa":"diuretyki pętlowe (pochodne sulfonamidów)","Mechanizm":"wiążą się z symporterem Na-K-2Cl w miejscu wiązania chloru w ramieniu wstępującym pętli Henlego → brak wchłaniania zwrotnego Na⁺, K⁺, Cl⁻ i wody; wtórne usuwanie Mg²⁺ i Ca²⁺","Zastosowanie":"ostra niewydolność nerek, obrzęki (płuc, serca, naczyń), powysiłkowy krwotok płuc u koni, diureza wymuszona przy zatruciach, hiperkalcemia","Przeciwwskazania":"hiperkaliemia (przy nefropatii), choroby wątroby","Niepożądane":"hipokaliemia, hipomagnezemia, hiponatremia, hipokalcemia, niewydolność krążenia, hipotensja, aktywacja R-A-A","Dodatkowe":"działają krótko, ale intensywnie; torasemid — pochodna sulfonylomocznika, inna budowa, ten sam mechanizm"}},{"n":"hydrochlorotiazyd, bendroflumetiazyd, chlorotalidon, metolazon, chlorotiazyd, cyklopentiazyd","k":2,"g":"DIURETYKI","p":{"Grupa":"tiazydowe","Mechanizm":"hamują symporter Na-Cl w części korowej kanalika dalszego (miejsce wiązania Na i Cl) → zahamowanie wchłaniania zwrotnego NaCl, usuwanie wody i sodu","Zastosowanie":"leczenie łagodnych obrzęków, kamica szczawianowa, przewlekła niewydolność serca","Przeciwwskazania":"jak dla sulfonamidów","Niepożądane":"jak sulfonamidy + silniej: hipokaliemia, hiperglikemia, hiperurykemia, hiperkalcemia","Dodatkowe":"osłabiają przesączanie kłębuszkowe; działają długo"}},{"n":"spironolakton, triamteren, amilorid","k":2,"g":"DIURETYKI","p":{"Grupa":"oszczędzające potas","Mechanizm":"spironolakton — antagonista aldosteronu; triamteren i amilorid — bezpośrednio na proces wchłaniania; zahamowanie wymiany K⁺ na Na⁺ w kanaliku zbiorczym","Zastosowanie":"aldosteronizm, niewydolność serca, przekrwienia, wodobrzusze","Przeciwwskazania":"zwierzęta odwodnione, hiperkaliemia","Niepożądane":"hiperkaliemia, zapalenie skóry pyska, zanik gruczołu krokowego","Dodatkowe":"nie stosować z innymi diuretykami oszczędzającymi K⁺"}},{"n":"teofilina, teobromina, aminofilina, eufilina","k":2,"g":"DIURETYKI","p":{"Grupa":"metyloksantyny","Mechanizm":"zwiększają przesączanie kłębuszkowe, zmniejszają wchłanianie zwrotne w kanalikach nerkowych (nieselektywny inhibitor PDE → ↑ cAMP)","Zastosowanie":"(diureza); stosowane głównie jako leki rozszerzające oskrzela","Dodatkowe":"niewielka siła działania"}},{"n":"mannitol","k":2,"g":"DIURETYKI","p":{"Grupa":"diuretyki osmotyczne","Mechanizm":"podwyższają ciśnienie osmotyczne moczu → wtórnie zwiększają ilość wydalanej wody; działają, gdy ich ilość przekracza maksymalną zdolność wchłaniania w kanalikach","Zastosowanie":"diureza wymuszona przy zatruciach, niewydolność nerek, jaskra, obrzęki mózgu","Dodatkowe":"można łączyć z furosemidem; ostra niewydolność, hiperwolemia"}},{"n":"witamina K1 (fitomenadion)","k":2,"g":"Leki wpływające na KRZEPNIĘCIE: hemostatyki / uszczelniające naczynia","p":{"Mechanizm":"kofaktor niezbędny do syntezy K-zależnych czynników krzepnięcia (II, VII, IX, X); umożliwia połączenie białek z Ca; uaktywnia protrombiny","Zwierzę / wskazania":"tabletki dla psów; leczenie zatrucia środkami przeciwzakrzepowymi, zaburzenia krzepnięcia, krwawienia","Przeciwwskazania":"alergia, choroby wątroby; ciąża/laktacja (przechodzi przez łożysko) po ocenie korzyści/ryzyka","Niepożądane":"wymioty, zaburzenia skórne (rumień, zapalenie), obrzęk alergiczny","Dodatkowe":"salicylany (NLPZ) i cefalosporyny ograniczają działanie; podawana przez 3 tyg., po 48 h ocena czasu krzepnięcia"}},{"n":"etamsylat","k":2,"g":"Leki wpływające na KRZEPNIĘCIE: hemostatyki / uszczelniające naczynia","p":{"Mechanizm":"hamuje syntezę prostacykliny (PGI2) → stymuluje adhezję płytek, skraca czas krwawienia, zmniejsza kruchość i przepuszczalność naczyń; działa na 1 fazę hemostazy","Zwierzę / wskazania":"bydło, owce, kozy, konie, świnie, psy, koty; krwotoki chirurgiczne, pourazowe, położnicze, profilaktyka przedoperacyjna","Przeciwwskazania":"nadwrażliwość; przed podaniem konieczne podwiązanie uszkodzonych naczyń; ciąża/laktacja po ocenie","Niepożądane":"anafilaksja (substancja pomocnicza), nudności, biegunka, wysypki","Dodatkowe":"roztwór i.v./i.m.; hemostatyczny i angioprotekcyjny; max efekt 30 min–4 h; eliminowany z moczem"}},{"n":"dobesylan wapnia","k":2,"g":"Leki wpływające na KRZEPNIĘCIE: hemostatyki / uszczelniające naczynia","p":{"Mechanizm":"uszczelnia naczynia przez zmniejszenie przepuszczalności śródbłonka, stabilizuje połączenia komórek, poprawia mikrokrążenie, hamuje mediatory zapalne","Zwierzę / wskazania":"psy, konie, rzadziej koty; zaburzenia mikrokrążenia, kruchość naczyń, przewlekłe obrzęki","Przeciwwskazania":"nadwrażliwość, niewydolność nerek, ciąża","Niepożądane":"zaburzenia żołądkowo-jelitowe, reakcje alergiczne","Dodatkowe":"nie maskuje stanu zapalnego"}},{"n":"witamina C","k":2,"g":"Leki wpływające na KRZEPNIĘCIE: hemostatyki / uszczelniające naczynia","p":{"Mechanizm":"uszczelnia naczynia, niezbędna do syntezy kolagenu (wzmacnia błonę podstawną), chroni śródbłonek (antyoksydacyjnie)","Zwierzę / wskazania":"świnki morskie, małpy; kruchość naczyń, zaburzenia gojenia","Przeciwwskazania":"kamica szczawianowa, niewydolność nerek","Niepożądane":"biegunka, zakwaszenie moczu","Dodatkowe":"działa wolno"}},{"n":"glikokortykosteroidy","k":2,"g":"Leki wpływające na KRZEPNIĘCIE: hemostatyki / uszczelniające naczynia","p":{"Mechanizm":"uszczelniają naczynia przez ich obkurczenie, zmniejszają obrzęk, zaczerwienienie, wysięk","Zwierzę / wskazania":"psy, koty, konie; ostre zapalenie naczyń, reakcje alergiczne, ostry obrzęk zapalny","Przeciwwskazania":"przewlekła kruchość naczyń, wybroczyny bez stanu zapalnego","Niepożądane":"po długim stosowaniu ściana naczynia się osłabia (↑ skłonność do wybroczyn)","Dodatkowe":"nie naprawiają naczyń — działają objawowo"}},{"n":"kwas traneksamowy","k":2,"g":"Leki wpływające na KRZEPNIĘCIE: hemostatyki / uszczelniające naczynia","p":{"Mechanizm":"blokuje wiązanie plazminogenu z fibryną (miejsca lizynowe) → ogranicza powstawanie plazminy przez tPA/uPA → hamuje fibrynolizę; nie działa na kaskadę krzepnięcia","Zwierzę / wskazania":"psy, koty (ostrożnie), konie; nadmierna fibrynoliza, krwawienia z błon śluzowych, urazy","Przeciwwskazania":"czynna choroba zatorowo-zakrzepowa, DIC, niewydolność nerek","Niepożądane":"drgawki, zawroty głowy, ryzyko zakrzepicy, nudności, wymioty, biegunka, nadwrażliwość","Dodatkowe":"inhibitor plazminogenu; i.v. lub doustnie"}},{"n":"tanina","k":2,"g":"Leki wpływające na KRZEPNIĘCIE: hemostatyki / uszczelniające naczynia","p":{"Mechanizm":"środek ściągający, miejscowo przeciwkrwotoczny — denaturuje białka śródbłonka i osocza (warstwa ochronna), obkurcza drobne naczynia, ↓ przepuszczalność","Zwierzę / wskazania":"psy, koty (ostrożnie), konie, bydło, owce, kozy; drobne rany, otarcia, krwawienie z dziąseł, biegunka","Przeciwwskazania":"krwawienie głębokie, zaburzenia krzepnięcia, owrzodzenia, odwodnienie, uszkodzenie nerek","Niepożądane":"podrażnienie, opóźnienie gojenia, martwica powierzchniowa, zaparcia, nudności","Dodatkowe":"doustnie (biegunki), miejscowo (rany)"}},{"n":"adrenalina","k":2,"g":"Leki wpływające na KRZEPNIĘCIE: hemostatyki / uszczelniające naczynia","p":{"Mechanizm":"małe dawki → rec. β, duże → rec. α (skurcz naczyń, stabilizacja mastocytów)","Zwierzę / wskazania":"psy, koty, konie, bydło (ostrożnie), owce, kozy; wstrząs anafilaktyczny, obrzęk naczynioruchowy, ciężkie reakcje alergiczne","Przeciwwskazania":"nadciśnienie, kardiomiopatia, zaburzenia rytmu, choroba naczyń obwodowych","Niepożądane":"niedokrwienie, martwica, skurcz naczyń obwodowych, tachykardia, arytmie, kwasica mleczanowa","Dodatkowe":"nie naprawiają naczyń — wymuszają ich zamknięcie"}},{"n":"noradrenalina","k":2,"g":"Leki wpływające na KRZEPNIĘCIE: hemostatyki / uszczelniające naczynia","p":{"Mechanizm":"pobudza rec. α → skurcz tętniczek i żyłek, ↓ przepuszczalności, ↑ ciśnienia i oporu obwodowego, poprawa perfuzji centralnej","Zwierzę / wskazania":"utrata napięcia naczyniowego, wstrząs septyczny, hipotensja, rozszerzenie naczyń w zapaleniu"}},{"n":"heparyna niefrakcjonowana","k":2,"g":"Krzepnięcie: antykoagulanty, przeciwpłytkowe, fibrynolityki","p":{"Grupa":"antykoagulant","Mechanizm":"wzmacnia działanie antytrombiny III (wiąże się z nią i zmienia jej kształt) → AT hamuje trombinę (IIa) i czynniki Xa, IXa, XIa, XIIa → brak fibryny → brak skrzepu","Zwierzę / wskazania":"psy, koty, konie, bydło, owce, kozy; zapobieganie i leczenie zakrzepów, zakrzepica żylna, DIC, zatorowość płucna, profilaktyka pooperacyjna","Przeciwwskazania":"czynne krwawienie, skazy krwotoczne, trombocytopenia, wrzody, świeże zabiegi, choroby wątroby","Niepożądane / dodatkowe":"nadmierne działanie, skłonność do krwawień, trombocytopenia; doustnie/i.v./s.c. — NIE i.m.; krótko (co 6–8 h); antidotum: siarczan protaminy"}},{"n":"heparyna drobnocząsteczkowa (enoksaparyna)","k":2,"g":"Krzepnięcie: antykoagulanty, przeciwpłytkowe, fibrynolityki","p":{"Grupa":"antykoagulant","Mechanizm":"aktywuje antytrombinę III, ale słabiej hamuje trombinę, a silniej czynnik Xa","Zwierzę / wskazania":"psy, koty, konie, bydło, owce, kozy; jw. (słabsze, bezpieczniejsze)","Przeciwwskazania":"czynne krwawienie, skazy krwotoczne, trombocytopenia, wrzody, świeże zabiegi, choroby wątroby","Niepożądane / dodatkowe":"mniejsze ryzyko trombocytopenii; małopłytkowość, krwawienia, krwiak w miejscu podania (s.c.); szybki początek, wysoka biodostępność, nie przechodzi przez łożysko"}},{"n":"warfaryna","k":2,"g":"Krzepnięcie: antykoagulanty, przeciwpłytkowe, fibrynolityki","p":{"Grupa":"antykoagulant (antagonista wit. K)","Mechanizm":"blokuje reduktazę epoksydową witaminy K → hamuje syntezę czynników zależnych od wit. K (trombina, VII, IX, X) → ↓ zdolność krzepnięcia","Zwierzę / wskazania":"psy, koty; zapobieganie i leczenie zakrzepów, choroby serca","Przeciwwskazania":"czynne krwawienie, skaza krwotoczna, urazy, operacje, choroby wątroby/nerek, ciąża, nadciśnienie","Niepożądane / dodatkowe":"krwawienia, wybroczyny, reakcje alergiczne"}},{"n":"acenokumarol","k":2,"g":"Krzepnięcie: antykoagulanty, przeciwpłytkowe, fibrynolityki","p":{"Grupa":"antykoagulant (antagonista wit. K)","Mechanizm":"antagonista witaminy K, szybsze działanie","Zwierzę / wskazania":"psy, koty; zapobieganie i leczenie zakrzepów, choroby serca","Przeciwwskazania":"czynne krwawienie, skaza krwotoczna, urazy, operacje, choroby wątroby/nerek, ciąża, nadciśnienie","Niepożądane / dodatkowe":"krwawienia, wybroczyny, reakcje alergiczne"}},{"n":"kwas acetylosalicylowy (ASA)","k":2,"g":"Krzepnięcie: antykoagulanty, przeciwpłytkowe, fibrynolityki","p":{"Grupa":"przeciwpłytkowy (antyagregacyjny)","Mechanizm":"nieodwracalnie hamuje COX-1 w płytkach → nie powstaje tromboksan A2 (agregacja płytek); działa przeciwzakrzepowo, przeciwbólowo, przeciwzapalnie, przeciwgorączkowo","Zwierzę / wskazania":"psy, koty (ostrożnie), konie; nadmierna agregacja płytek, profilaktyka zakrzepów i zatorowości, choroby serca","Przeciwwskazania":"aktywne krwawienie, wrzody, skazy krwotoczne, niewydolność nerek, wątroby, ciąża","Niepożądane / dodatkowe":"zwiększone krwawienie, wybroczyny, nadwrażliwość, nefrotoksyczność, wymioty, biegunka"}},{"n":"klopidogrel","k":2,"g":"Krzepnięcie: antykoagulanty, przeciwpłytkowe, fibrynolityki","p":{"Grupa":"przeciwpłytkowy","Mechanizm":"blokuje receptor ADP na płytkach → uniemożliwia ich aktywację i agregację; nie uszczelnia naczyń","Zwierzę / wskazania":"psy, koty, konie (rzadko), bydło (rzadko); zapobieganie zakrzepom, profilaktyka zatorowości, choroby serca","Przeciwwskazania":"czynne krwawienie, skaza krwotoczna, nadwrażliwość, choroby wątroby i nerek","Niepożądane / dodatkowe":"krwawienia, wybroczyny, wymioty, biegunka; działa systemowo"}},{"n":"urokinaza","k":2,"g":"Krzepnięcie: antykoagulanty, przeciwpłytkowe, fibrynolityki","p":{"Grupa":"fibrynolityk","Mechanizm":"aktywuje plazminogen → plazmina rozpuszcza fibrynę w skrzepach; nie wzmacnia naczyń","Zwierzę / wskazania":"psy, koty (ostrożnie), konie/bydło (rzadko); zakrzepica żylna, zatorowość płucna, rewaskularyzacja","Przeciwwskazania":"czynne krwawienie, skaza krwotoczna, udar krwotoczny, nadciśnienie, ciąża, niewydolność nerek i wątroby","Niepożądane / dodatkowe":"krwawienia, trombocytopenia, reakcje alergiczne, hipotensja, anafilaksja; systemowo lub miejscowo"}},{"n":"hydrokortyzon","k":2,"g":"GLIKOKORTYKOSTEROIDY","p":{"Czas działania":"krótki (<12 h)","Zastosowanie":"niedoczynność kory nadnerczy, stany zapalne, alergiczne i atopowe zapalenia skóry, stany zapalne płuc, ketoza, indukcja porodu u przeżuwaczy, wstrząs","Przeciwwskazania":"zapalenie tworzywa kopytowego, choroby infekcyjne, choroby wrzodowe, ciąża, infekcje gałki ocznej, jaskra, zaćma, cukrzyca, okres złamań i gojenia ran, nefropatie, nadciśnienie","Niepożądane":"czynnościowy zanik kory nadnerczy, jatrogenny zespół Cushinga , hiperglikemia, nadciśnienie, obrzęki, hipokaliemia, zapalenie tworzywa kopytowego, wrzody, osteoporoza, jaskra/zaćma, poronienia, drgawki"}},{"n":"prednizon, prednizolon, metyloprednizolon","k":2,"g":"GLIKOKORTYKOSTEROIDY","p":{"Czas działania":"średni (12–36 h)"}},{"n":"flumetazon, deksametazon, betametazon","k":2,"g":"GLIKOKORTYKOSTEROIDY","p":{"Czas działania":"długi (36–48 h)"}},{"n":"gonadorelina, buserelina, peforelina","k":2,"g":"Hormony: gonadotropiny i ich agoniści/antagoniści (GnRH, LH/FSH)","p":{"Grupa":"agoniści gonadoliberyny — KRÓTKODZIAŁAJĄCE","Mechanizm / skutek":"aktywacja rec. GnRH → ↑ uwalniania endogennego LH (i mniej FSH)","Zastosowanie":"indukcja owulacji (niedobór LH / koniec fazy estrus), synchronizacja rui, ↑ płodności, leczenie torbieli jajnika u bydła, u samców ↑ libido i ilości nasienia","Przeciwwskazania":"ciąża, niedojrzałość płciowa","Niepożądane":"po przedawkowaniu zaburzenia cyklu rujowego"}},{"n":"deslorelina, goserelina, tryptorelina","k":2,"g":"Hormony: gonadotropiny i ich agoniści/antagoniści (GnRH, LH/FSH)","p":{"Grupa":"agoniści GnRH — DŁUGODZIAŁAJĄCE","Mechanizm / skutek":"docelowo hamowanie wydzielania LH i FSH (desensytyzacja przysadki)","Zastosowanie":"odwracalna sterylizacja psów (implant dla samców)","Niepożądane":"pobudzenie, zmniejszenie jąder"}},{"n":"cetroreliks, ganireliks","k":2,"g":"Hormony: gonadotropiny i ich agoniści/antagoniści (GnRH, LH/FSH)","p":{"Grupa":"antagoniści GnRH","Mechanizm / skutek":"blokują receptory GnRH w przysadce → ↓ wydzielania LH i FSH"}},{"n":"folitropina (FSH)","k":2,"g":"Hormony: gonadotropiny i ich agoniści/antagoniści (GnRH, LH/FSH)","p":{"Grupa":"gonadotropiny przysadkowe","Mechanizm / skutek":"pobudza wzrost pęcherzyków jajnikowych i wydzielanie estrogenów (ruja), u samców spermatogenezę","Zastosowanie":"indukcja superowulacji u bydła","Przeciwwskazania":"ciąża, niedojrzałość płciowa","Niepożądane":"obniżenie wydajności mlecznej"}},{"n":"lutropina (LH)","k":2,"g":"Hormony: gonadotropiny i ich agoniści/antagoniści (GnRH, LH/FSH)","p":{"Grupa":"gonadotropiny przysadkowe","Mechanizm / skutek":"współdziała z FSH; dojrzewanie pęcherzyków, owulacja, rozwój ciałka żółtego i produkcja progesteronu; u samców produkcja testosteronu","Zastosowanie":"indukcja superowulacji u bydła, torbiele jajnika, opóźniona ruja","Niepożądane":"reakcje nadwrażliwości, skrócenie fazy lutealnej"}},{"n":"gonadotropina kosmówkowa (hCG)","k":2,"g":"Hormony: gonadotropiny i ich agoniści/antagoniści (GnRH, LH/FSH)","p":{"Grupa":"gonadotropiny pozaprzysadkowe (łożyskowe)","Mechanizm / skutek":"głównie aktywność LH — utrzymanie ciałka żółtego i produkcja progesteronu","Zastosowanie":"krowy: poprawa zacieleń, indukcja owulacji, torbielowatość jajników; samce: ↓ libido, wnętrostwo","Niepożądane":"reakcje anafilaktyczne; u kotów długotrwała niepłodność"}},{"n":"gonadotropina surowicy źrebnych klaczy (eCG/PMSG)","k":2,"g":"Hormony: gonadotropiny i ich agoniści/antagoniści (GnRH, LH/FSH)","p":{"Grupa":"gonadotropiny pozaprzysadkowe","Mechanizm / skutek":"aktywność FSH, ale u klaczy dominuje działanie jak LH","Zastosowanie":"przeżuwacze: superowulacja; króliki: indukcja i synchronizacja owulacji; samce: spermatogeneza","Przeciwwskazania":"ciąża","Niepożądane":"reakcje anafilaktyczne; długodziałający"}},{"n":"bromokryptyna","k":2,"g":"Hormony: inhibitory i induktory prolaktyny (agoniści/antagoniści D2)","p":{"Grupa":"agonista rec. D2 (inhibitor PRL)","Mechanizm / skutek":"wiąże rec. D2 w OUN → hamuje uwalnianie PRL → ↓ syntezy progesteronu przez ciałko żółte; ↓ ACTH","Zastosowanie":"ciąża urojona u suk, zahamowanie laktacji suk i kotek, zespół Cushinga u koni","Przeciwwskazania":"ciąża, zwierzęta karmiące","Niepożądane":"wymioty, brak apetytu, zmiany zachowania; z dinoprostem — środek poronny"}},{"n":"kabergolina","k":2,"g":"Hormony: inhibitory i induktory prolaktyny (agoniści/antagoniści D2)","p":{"Grupa":"agonista rec. D2","Mechanizm / skutek":"wiąże rec. D2 → hamuje PRL i laktację","Zastosowanie":"ciąża urojona suk, zahamowanie laktacji, redukcja objętości gruczołu sutkowego przed zabiegiem","Przeciwwskazania":"ciąża","Niepożądane":"wymioty, brak apetytu, senność"}},{"n":"pergolid","k":2,"g":"Hormony: inhibitory i induktory prolaktyny (agoniści/antagoniści D2)","p":{"Grupa":"agonista rec. D1 i D2","Mechanizm / skutek":"↓ uwalniania ACTH","Zastosowanie":"leczenie zespołu Cushinga u koni","Niepożądane":"↓ apetyt, biegunka, bóle morzyskowe, ospałość"}},{"n":"metergolina","k":2,"g":"Hormony: inhibitory i induktory prolaktyny (agoniści/antagoniści D2)","p":{"Mechanizm / skutek":"silne działanie przeciwserotoninowe","Niepożądane":"lęk, agresja, nadmierne pobudzenie"}},{"n":"promazyna, haloperidol, sulpiryd, metoklopramid","k":2,"g":"Hormony: inhibitory i induktory prolaktyny (agoniści/antagoniści D2)","p":{"Grupa":"antagoniści rec. D2 (induktory PRL)","Mechanizm / skutek":"blokada rec. D2 → ↑ wydzielania prolaktyny"}},{"n":"estradiol, estron, estry estradiolu (cypionian, benzoesan, walerianian)","k":2,"g":"Hormony płciowe: estrogeny i antyestrogeny","p":{"Grupa":"leki o działaniu estrogenowym","Mechanizm / skutek":"działanie zbliżone do fizjologicznego estrogenu","Zastosowanie":"indukcja i synchronizacja rui u bydła, przyspieszenie inwolucji macicy po porodzie; psy: gruczolak odbytu, rozrost prostaty, ↓ libido; suki: nietrzymanie moczu po kastracji, po przypadkowym kryciu","Przeciwwskazania":"ciąża, przerosty endometrium u suk (ryzyko ropomacicza), guzy gruczołu sutkowego, cysty jajnikowe, zwierzęta do konsumpcji","Niepożądane / dodatkowe":"leukopenia, ↑ ryzyka nowotworów, feminizacja, obrzęki; silny efekt pierwszego przejścia (metabolizm w wątrobie)"}},{"n":"estriol","k":2,"g":"Hormony płciowe: estrogeny i antyestrogeny","p":{"Grupa":"naturalny krótko działający estrogen","Mechanizm / skutek":"zwiększa wrażliwość rec. α-adrenergicznych → ↑ napięcie zwieracza cewki moczowej","Zastosowanie":"nietrzymanie moczu suk","Przeciwwskazania":"ciąża","Niepożądane / dodatkowe":"brak wpływu na szpik, ropomacicze, nowotwory"}},{"n":"anty-estrogeny / SERM (np. tamoksyfen)","k":2,"g":"Hormony płciowe: estrogeny i antyestrogeny","p":{"Grupa":"antyestrogeny / częściowi agoniści-antagoniści rec. estrogenowych","Mechanizm / skutek":"hamowanie syntezy receptorów estrogenowych lub antagonizm; działanie na tkanki wrażliwe na estrogeny","Zastosowanie":"(leczenie przerostu prostaty u psów — tamoksyfen)"}},{"n":"altrenogest (alternogest)","k":2,"g":"Hormony płciowe: gestageny i antygestageny","p":{"Mechanizm / skutek":"syntetyczny progesteron — hamuje pulsacyjne wydzielanie GnRH → ↓ LH/FSH → brak owulacji; hamowanie fazy estrus","Zastosowanie":"synchronizacja cyklu u świń, regulacja cyklu i ograniczenie zachowań rujowych u klaczy","Przeciwwskazania":"niedojrzałość płciowa, zakażenia macicy, samce","Niepożądane":"karencja, zatrzymanie rui, zmiany nastroju, letarg, senność, brak apetytu","Dodatkowe":"doustny, miejscowy; stabilny, wysoka biodostępność"}},{"n":"octan medroksyprogesteronu (MPA), megestrol (MA)","k":2,"g":"Hormony płciowe: gestageny i antygestageny","p":{"Mechanizm / skutek":"blokuje GnRH i wyrzut LH/FSH → hamuje rozwój pęcherzyków, owulację i produkcję estrogenów; silne działanie antygonadotropowe","Zastosowanie":"opóźnianie/zatrzymanie rui (klacze, kotki), synchronizacja rui, terapia behawioralna (znakowanie moczem, nimfomania u kotów), choroby skóry kotów, łagodny przerost prostaty psów","Przeciwwskazania":"proestrus/estrus/metaestrus, cukrzyca, niedoczynność kory nadnerczy, guzy gruczołu sutkowego, ciąża, laktacja, ropomacicze, niedojrzałość płciowa","Niepożądane":"powiększenie gruczołu mlekowego, ↑ ryzyka guzów sutka, fibroadenomatoza u kotów, przerost i torbielowatość błony śluzowej macicy, akromegalia, ↑ łaknienia i masy ciała, cukrzyca, supresja osi PPN","Dodatkowe":"preparaty Depo (przedłużone działanie); i.m./s.c.; przenika przez barierę krew-mózg, do łożyska i mleka"}},{"n":"norgestomet, flugeston, proligeston (PGS)","k":2,"g":"Hormony płciowe: gestageny i antygestageny","p":{"Mechanizm / skutek":"gestageny","Zastosowanie":"implant uszny dla krów (9–10 dni) / wkładki dopochwowe dla owiec (12–14 dni); proligeston — suki, kotki do zatrzymania rui","Niepożądane":"wyłysienia, zmiany zabarwienia włosów w miejscu podania","Dodatkowe":"proligeston — podskórnie, na dowolnym etapie cyklu"}},{"n":"octan chlormadinonu (CMA), octan delmadinonu","k":2,"g":"Hormony płciowe: gestageny i antygestageny","p":{"Mechanizm / skutek":"gestageny o działaniu antyandrogenowym — konkurują z testosteronem o receptory androgenowe","Zastosowanie":"suki, kotki — opóźnienie/zatrzymanie rui; psy/kocury — łagodny lub rakowaty przerost prostaty, guzy okołoodbytowe, agresja hormonozależna","Przeciwwskazania":"choroby wątroby i nerek, cukrzyca, guzy gruczołu mlekowego, wiek <1 roku","Niepożądane":"↓ płodności i libido, polifagia, zmiany koloru włosa, ↑ enzymów wątrobowych, zmiany w tkance jąder","Dodatkowe":"długodziałający, podskórnie/doustnie"}},{"n":"aglepriston","k":2,"g":"Hormony płciowe: gestageny i antygestageny","p":{"Mechanizm / skutek":"antygestagen — antagonista receptora dla progesteronu w macicy (silniejsze powinowactwo niż endogenny)","Zastosowanie":"terminacja ciąży przed 45. dniem (psy, koty), indukcja porodu, leczenie ropomacicza i fibroadenomatozy u kotek, akromegalia psów","Przeciwwskazania":"zaburzenia wątroby i nerek, cukrzyca, niedoczynność kory nadnerczy, zły stan ogólny","Niepożądane":"bolesność w miejscu iniekcji, śluzowy wypływ z dróg rodnych, objawy towarzyszące porodowi","Dodatkowe":"powinowactwo do rec. GKS, ale działa jak antagonista — NIE podawać z GKS"}},{"n":"testosteron i estry (propionian, enantan, dekanonian), pochodne (metylotestosteron, nortestosteron); sterydy anaboliczne (nandrolon, boldenon, stanozolol, oksymetolon)","k":2,"g":"Hormony płciowe: androgeny i antyandrogeny","p":{"Grupa":"androgeny / anaboliki","Mechanizm / skutek":"endogenny, produkowany w komórkach Leydiga pod wpływem LH; rozwój cech płciowych samca, spermatogeneza, libido; działanie anaboliczne (↑ masy mięśniowej, zatrzymanie Na i wody, ↑ erytrocytów)","Zastosowanie":"niedobory hormonu, hipogonadyzm, ↑ libido, wnętrostwo, wyłysienia, nietrzymanie moczu, feminizacja; u samic — hamowanie rui suk i kotek","Przeciwwskazania":"niedojrzałość płciowa, choroby wątroby, serca i krążenia, nowotwory androgenozależne, ciąża, laktacja","Niepożądane":"zaburzenia funkcji rozrodczych, hepatotoksyczność, zaburzenie równowagi wodno-elektrolitowej, przerost prostaty, ↑ agresywności"}},{"n":"ozateron, cyproteron","k":2,"g":"Hormony płciowe: androgeny i antyandrogeny","p":{"Grupa":"antyandrogeny","Mechanizm / skutek":"antagonizm kompetycyjny rec. androgenowych w gruczole krokowym → redukcja objętości, hamuje transport testosteronu do gruczołu (bez wpływu na płodność)","Zastosowanie":"przerost gruczołu krokowego u psów, leczenie agresji, kontrola zachowań","Przeciwwskazania":"choroby wątroby, nerek, ciąża, laktacja, zaburzenia hormonalne, niedojrzałość płciowa","Niepożądane":"wzrost apetytu, zmiany zachowania, zaburzenia pp, przejściowy ↓ kortyzolu, senność, ginekomastia"}},{"n":"finasteryd","k":2,"g":"Hormony płciowe: androgeny i antyandrogeny","p":{"Grupa":"antyandrogen","Mechanizm / skutek":"hamuje 5α-reduktazę testosteronu (↓ konwersji testosteronu do DHT)","Zastosowanie":"leczenie przerostu prostaty u psów","Przeciwwskazania":"choroby wątroby, nerek, ciąża, laktacja, niedojrzałość płciowa","Niepożądane":"zaburzenia libido, zmiany w jądrze i wątrobie (bez wpływu na poziom testosteronu i jakość nasienia)"}},{"n":"delmadinon","k":2,"g":"Hormony płciowe: androgeny i antyandrogeny","p":{"Grupa":"antyandrogen (gestagen)","Mechanizm / skutek":"antagonizm rec. androgenowego + działanie antygonadotropowe (↓ LH i FSH → ↓ testosteronu)","Zastosowanie":"psy/kocury — łagodny lub rakowaty przerost prostaty, gruczolak okołoodbytowy, agresja hormonozależna, nadpobudliwość płciowa","Przeciwwskazania":"cukrzyca, choroby serca, nerek, wątroby, ciąża, laktacja, owrzodzenia żołądka i jelit, niedojrzałość płciowa","Niepożądane":"↑ apetytu i masy, wymioty, biegunka, poliuria, polidypsja, ryzyko zapalenia pęcherza, łysienie, retencja Na i wody, ↑ glukozy, osłabienie mięśni, osteoporoza"}},{"n":"dinoprost (+ analogi: alfaprostol, luprostiol, kloprostenol, tiaprost, deksakloprostenol)","k":2,"g":"Prostaglandyny, oksytocyki i tokolityki (poród / macica)","p":{"Grupa":"analog prostaglandyny F2α","Mechanizm / skutek":"wiąże rec. PGF2α na komórkach lutealnych → ↑ Ca, aktywacja enzymów proteolitycznych, apoptoza → ↓ progesteronu, ↑ LH i FSH; luteoliza, skurcz mięśniówki macicy","Zastosowanie":"indukcja i synchronizacja rui, luteoliza (przetrwałe ciałko żółte, torbiele lutealne), przerwanie ciąży, indukcja porodu","Przeciwwskazania":"ciąża (gdy nie zamierzona), astma, choroby układu oddechowego","Niepożądane":"skurcze macicy (ból), biegunka, skurcz oskrzeli, ↑ ciśnienia, wymioty u mięsożernych, drżenia mięśniowe, zatrzymanie łożyska"}},{"n":"karbetocyna","k":2,"g":"Prostaglandyny, oksytocyki i tokolityki (poród / macica)","p":{"Grupa":"oksytocyk (syntetyczny analog oksytocyny)","Mechanizm / skutek":"agonista rec. oksytocyny (macica, gruczoł mlekowy) → ↑ Ca → skurcz mięśni gładkich; ↑ wydzielania PGF2α","Zastosowanie":"pobudzenie i wzmacnianie skurczów macicy podczas porodu, stymulacja uwalniania mleka, inwolucja macicy, wydalanie łożyska, mastitis","Przeciwwskazania":"niedrożność dróg rodnych, nieprawidłowe ułożenie płodu, skurcze toniczne, hipoglikemia, hipokaliemia","Niepożądane":"nadmierny skurcz macicy, zaburzenia przepływu łożyskowego, niedotlenienie płodu, odklejenie/pęknięcie macicy, zaburzenia rytmu, tachykardia; dłuższy i stabilniejszy od oksytocyny"}},{"n":"denaweryna","k":2,"g":"Prostaglandyny, oksytocyki i tokolityki (poród / macica)","p":{"Grupa":"tokolityk (inhibitor PDE)","Mechanizm / skutek":"hamuje PDE → ↑ cAMP → rozkurcz mięśniówki macicy, rozszerzenie kanału rodnego; słabe działanie znieczulające i uspokajające","Zastosowanie":"przyspieszenie i ułatwienie akcji porodowej u krów, rozszerzenie kanału rodnego, regulacja skurczów","Przeciwwskazania":"mechaniczne przeszkody porodowe, brak rozpoczęcia skurczów","Niepożądane":"wzmożony niepokój, obrzęki w miejscu podania"}},{"n":"pergolid","k":2,"g":"Nadnercza: leki na nadczynność / niedoczynność kory","p":{"Grupa":"agonista dopaminergiczny","Mechanizm / skutek":"stymuluje postsynaptyczne rec. D1 i D2 → ↓ uwalniania ACTH","Zastosowanie":"zespół Cushinga (nadczynność kory nadnerczy), głównie u koni","Przeciwwskazania":"nadwrażliwość na pochodne sporyszu, konie <2 r.ż.","Niepożądane":"brak apetytu, biegunki, ↓ masy ciała, apatia, bóle morzyskowe u koni"}},{"n":"selegilina","k":2,"g":"Nadnercza: leki na nadczynność / niedoczynność kory","p":{"Grupa":"inhibitor MAO-B","Mechanizm / skutek":"blokowanie MAO-B → hamowanie metabolizmu dopaminy w OUN → ↑ dopaminy → ↓ ACTH → ↓ kortyzolu","Zastosowanie":"zespół Cushinga (psy, koty, konie)","Przeciwwskazania":"guzy nadnerczy","Niepożądane":"wymioty, biegunka"}},{"n":"bromokryptyna","k":2,"g":"Nadnercza: leki na nadczynność / niedoczynność kory","p":{"Grupa":"agonista D2","Mechanizm / skutek":"hamuje uwalnianie prolaktyny → ↓ ACTH","Zastosowanie":"zespół Cushinga, akromegalia","Przeciwwskazania":"ciąża, ropomacicze, powiększenie gruczołu sutkowego","Niepożądane":"obniżenie ciśnienia; może być stosowana do przerwania ciąży"}},{"n":"trilostan","k":2,"g":"Nadnercza: leki na nadczynność / niedoczynność kory","p":{"Grupa":"konkurencyjny odwracalny inhibitor dehydrogenazy 3-β-hydroksysteroidowej","Mechanizm / skutek":"hamowanie enzymu → blok kolejnych etapów syntezy kortyzolu z kory nadnerczy; obniża aldosteron","Zastosowanie":"zespół Cushinga (głównie psy)","Przeciwwskazania":"niedomoga nerek/wątroby, ciąża/laktacja","Niepożądane":"ospałość, wymioty, ↓ apetytu, martwica w nadnerczach, odwodnienie, hiponatremia, hipokaliemia"}},{"n":"mitotan","k":2,"g":"Nadnercza: leki na nadczynność / niedoczynność kory","p":{"Grupa":"lek cytostatyczny","Mechanizm / skutek":"hamuje sterol-O-acetylotransferazę (gromadzi się cholesterol); wiąże się z białkami nadnerczy → czynny metabolit niszczy komórki kory nadnerczy","Zastosowanie":"zespół Cushinga","Przeciwwskazania":"ciąża","Niepożądane":"ospałość, anoreksja, ataksja, wymioty"}},{"n":"ketokonazol","k":2,"g":"Nadnercza: leki na nadczynność / niedoczynność kory","p":{"Grupa":"lek przeciwgrzybiczy","Mechanizm / skutek":"hamuje enzymy cytochromu P450 biorące udział w syntezie hormonów steroidowych","Zastosowanie":"zespół Cushinga","Przeciwwskazania":"ciąża","Niepożądane":"wymioty, biegunka, uszkodzenia wątroby, zaćma"}},{"n":"lewotyroksyna","k":2,"g":"Tarczyca i trzustka (insulina)","p":{"Grupa":"hormon tarczycy","Mechanizm":"naśladuje działanie tetrajodotyroniny (T4), przekształcana w T3","Zastosowanie":"terapia zastępcza u zwierząt z niedoborem hormonów tarczycy","Przeciwwskazania":"nadczynność tarczycy","Niepożądane":"zaburzenia rytmu serca, zapalenie płuc"}},{"n":"tiamazol","k":2,"g":"Tarczyca i trzustka (insulina)","p":{"Grupa":"lek tyreostatyczny","Mechanizm":"hamuje wiązanie jodu z peroksydazą tarczycową (inaktywuje enzym) → zapobiega jodowaniu tyreoglobuliny i wbudowywaniu jodu do tyrozyny","Zastosowanie":"nadczynność tarczycy (koty)","Przeciwwskazania":"niewydolność nerek, choroby wątroby","Niepożądane":"wymioty, jadłowstręt, apatia, świąd; brak apetytu, przedłużone krwawienie, niedokrwistość, żółtaczka, małopłytkowość, eozynofilia, leukopenia, limfocytoza"}},{"n":"insulina","k":2,"g":"Tarczyca i trzustka (insulina)","p":{"Grupa":"hormon","Mechanizm":"(regulacja gospodarki węglowodanowej)","Zastosowanie":"cukrzyca","Niepożądane":"hipoglikemia"}},{"n":"apomorfina","k":2,"g":"Pokarmowy: leki wymiotne (Emetica)","p":{"Grupa":"o działaniu ośrodkowym","Mechanizm":"agonista receptorów D2 w CTZ","Zastosowanie":"jednorazowe podanie podskórne, wymioty po 2–15 min","Przeciwwskazania":"połknięcie środków żrących/pieniących/lotnych i ostrych przedmiotów, depresja OUN, drgawki, niewydolność wątroby; NIE u kotów","Niepożądane":"senność, ↑ ślinienia, bradykardia/częstoskurcz, ↓ ciśnienia, odwodnienie; opioidy/barbiturany nasilają depresję OUN"}},{"n":"ropinirol","k":2,"g":"Pokarmowy: leki wymiotne (Emetica)","p":{"Grupa":"o działaniu ośrodkowym","Mechanizm":"agonista receptorów dopaminergicznych w CTZ","Zastosowanie":"krople do oczu dla psów; wymioty po 15 min","Przeciwwskazania":"połknięcie ostrych/żrących substancji, depresja OUN, padaczka, ciąża, laktacja","Niepożądane":"przekrwienie oka, wysunięcie III powieki, ospałość, tachykardia, drgawki, biegunka, przedłużone wymioty"}},{"n":"ksylazyna, deksmedetomidyna, medetomidyna","k":2,"g":"Pokarmowy: leki wymiotne (Emetica)","p":{"Grupa":"o działaniu ośrodkowym","Mechanizm":"selektywni agoniści receptorów α2 (uspokajające, przeciwbólowe)","Zastosowanie":"wymioty po kilku min; leki z wyboru dla kotów","Przeciwwskazania":"bradykardia, choroby serca, wstrząs, odwodnienie, ciąża, cukrzyca, niewydolność oddechowa","Niepożądane":"bradykardia, hipotensja, depresja oddechu, sedacja, ataksja, hipotermia, hiperglikemia, nadmierne ślinienie"}},{"n":"woda utleniona, chlorek sodu, soda oczyszczona","k":2,"g":"Pokarmowy: leki wymiotne (Emetica)","p":{"Grupa":"o działaniu obwodowym","Mechanizm":"drażnienie błony śluzowej pp","Zastosowanie":"nagłe wymioty wywoływane przez właściciela","Niepożądane":"podrażnienia, uszkodzenia błon śluzowych pp"}},{"n":"maropitant","k":2,"g":"Pokarmowy: leki przeciwwymiotne (Antiemetica)","p":{"Mechanizm":"antagonista receptora NK1 (dla substancji P) w ośrodku wymiotnym; NIE działa uspokajająco","Zastosowanie":"hamuje wymioty RÓŻNEGO pochodzenia","Przeciwwskazania":"choroby wątroby (metabolizm), choroby serca (powinowactwo do kanałów Ca), ciąża/laktacja po ocenie","Niepożądane":"ból w miejscu podania, reakcje alergiczne, letarg, ataksja, drgawki, drżenia mięśni","Dodatkowe":"tabletki, s.c./i.v. dla psów i kotów; podać godzinę wcześniej, raz dziennie; silnie wiąże się z białkami osocza"}},{"n":"metoklopramid","k":2,"g":"Pokarmowy: leki przeciwwymiotne (Antiemetica)","p":{"Mechanizm":"ośrodkowo antagonista rec. D2 w CTZ, obwodowo antagonista D2 + agonista 5-HT4 (↑ wydzielania ACh)","Zastosowanie":"hamuje wymioty pochodzenia GASTRYCZNEGO i TOKSYCZNEGO, NIE pochodzenia błędnikowego; prokinetyk (refluks, zapalenie żołądka)","Przeciwwskazania":"perforacja/niedrożność pp, krwawienia w pp, padaczka, urazy głowy, ciąża urojona u suk, guz chromochłonny","Niepożądane":"pobudzenie, niezborność ruchów, drżenia, drgawki, agresja, senność, biegunka, ↑ uwalniania prolaktyny","Dodatkowe":"tabletki, i.m./s.c. dla psów i kotów"}},{"n":"ondansetron","k":2,"g":"Pokarmowy: leki przeciwwymiotne (Antiemetica)","p":{"Mechanizm":"blokuje receptory 5-HT3 obwodowo i ośrodkowo","Zastosowanie":"zapobieganie wymiotom po chemioterapii i radioterapii (uwalnianie serotoniny z uszkodzonych tkanek)","Przeciwwskazania":"nadwrażliwość, zaburzenia rytmu, hipokaliemia, niewydolność wątroby","Niepożądane":"ból głowy, zawroty, senność, zaburzenia rytmu serca, ↓ ciśnienia, zaparcia","Dodatkowe":"nie znosi niedrożności mechanicznej jelit"}},{"n":"acepromazyna, prometazyna, tietylperazyna, haloperidol","k":2,"g":"Pokarmowy: leki przeciwwymiotne (Antiemetica)","p":{"Mechanizm":"antagoniści rec. D2, H1 i M w OUN (neuroleptyki — fenotiazyny, butyrofenony)","Zastosowanie":"hamują wymioty różnego pochodzenia, skuteczne w wymiotach BŁĘDNIKOWYCH; działanie uspokajające","Dodatkowe":"doustnie, iniekcyjnie dla psów i kotów"}},{"n":"dimenhydrynat, difenhydramina, prometazyna","k":2,"g":"Pokarmowy: leki przeciwwymiotne (Antiemetica)","p":{"Mechanizm":"antagoniści rec. H1 i M (leki przeciwhistaminowe)","Zastosowanie":"wymioty pochodzenia BŁĘDNIKOWEGO, indukowane radioterapią, schorzenia żołądka"}},{"n":"skopolamina","k":2,"g":"Pokarmowy: leki przeciwwymiotne (Antiemetica)","p":{"Mechanizm":"antagonista rec. M (parasympatykolityk)","Zastosowanie":"choroba lokomocyjna psów","Przeciwwskazania":"nie stosować u kotów"}},{"n":"omeprazol","k":2,"g":"Pokarmowy: choroba wrzodowa (IPP, H2, osłaniające)","p":{"Grupa":"inhibitor pompy protonowej (IPP)","Mechanizm":"hamuje ATP-azę H⁺/K⁺ na komórkach okładzinowych → ↓ wydzielania kwasu solnego niezależnie od bodźca","Przeciwwskazania":"choroby wątroby, ciąża i laktacja","Niepożądane":"nadwrażliwość, ↓ apetytu i masy, biegunka, wymioty, achylia (brak HCl), przerost błony śluzowej żołądka (↑ gastryny)","Dodatkowe":"doustnie (psy, koty, konie), i.v. (konie); silny wzrost produkcji HCl po odstawieniu — stopniowe"}},{"n":"ranitydyna, famotydyna","k":2,"g":"Pokarmowy: choroba wrzodowa (IPP, H2, osłaniające)","p":{"Grupa":"antagoniści rec. H2","Mechanizm":"blokowanie rec. H2 → ↓ produkcji HCl (krócej i mniej stabilnie niż IPP)","Przeciwwskazania":"choroby serca, wątroby, nerek, nadwrażliwość","Niepożądane":"nudności, brak apetytu, senność, apatia, zaparcia/biegunka, bradykardia, hipotensja, zaburzenia rytmu","Dodatkowe":"psy, koty, konie — doustnie/i.v./i.m./s.c.; brak działania prokinetycznego"}},{"n":"mizoprostol","k":2,"g":"Pokarmowy: choroba wrzodowa (IPP, H2, osłaniające)","p":{"Grupa":"analog PGE1","Mechanizm":"pobudza rec. dla PGE → hamuje wydzielanie HCl, nasila produkcję wodorowęglanów i śluzu (cytoprotekcyjnie)","Przeciwwskazania":"ciąża (poronienia), laktacja (do mleka)","Niepożądane":"wymioty, biegunka, ból brzucha, skurcze macicy, przedwczesny poród, drżenia mięśniowe, napady padaczkowe","Dodatkowe":"nie łączyć z omeprazolem (osłania jego działanie)"}},{"n":"sukralfat, cytrynian potasowo-bizmutawy, koloidalny bizmut","k":2,"g":"Pokarmowy: choroba wrzodowa (IPP, H2, osłaniające)","p":{"Grupa":"selektywne leki osłaniające","Mechanizm":"w kontakcie z uszkodzoną błoną (pH<4) tworzą kompleksy wypełniające ubytek (warstwa ochronna przed HCl), nasilają syntezę PG","Dodatkowe":"cytoprotekcja; nie stosować z lekami neutralizującymi ani mlekiem; mogą ↓ wchłanianie innych leków"}},{"n":"pektyny, śluzy roślinne, siemię lniane","k":2,"g":"Pokarmowy: choroba wrzodowa (IPP, H2, osłaniające)","p":{"Grupa":"nieselektywne leki osłaniające","Mechanizm":"tworzą warstwę chroniącą błonę śluzową żołądka przed HCl"}},{"n":"związki glinu, magnezu, wapnia","k":2,"g":"Pokarmowy: choroba wrzodowa (IPP, H2, osłaniające)","p":{"Grupa":"leki neutralizujące kwas solny","Mechanizm":"↑ pH soku żołądkowego; glin działa zapierająco, magnez przeczyszczająco","Niepożądane":"wtórna hipersekrecja HCl, alkalizacja pp, ryzyko infekcji"}},{"n":"metoklopramid","k":2,"g":"Pokarmowy: prokinetyki, spazmolityki, na perystaltykę","p":{"Grupa":"prokinetyk","Mechanizm / skutek":"ośrodkowo antagonista D2, obwodowo antagonista D2 + agonista 5-HT4 → ↑ uwalniania ACh; nasilenie skurczów żołądka, przyspieszenie opróżniania, ↑ napięcia zwieracza wpustu","Zastosowanie":"leczenie wymiotów, opróżnianie żołądka; bezpiecznie u koni","Przeciwwskazania":"padaczka, zaparcia, niedrożność/krwawienia pp, psy z przełykiem olbrzymim","Niepożądane":"drżenia, ataksja, zachowania paradoksalne (jak neuroleptyki fenotiazynowe)"}},{"n":"domperydon","k":2,"g":"Pokarmowy: prokinetyki, spazmolityki, na perystaltykę","p":{"Grupa":"prokinetyk","Mechanizm / skutek":"antagonista rec. D2; opróżnianie żołądka (nie wpływa na HCl, brak działania przeciwwymiotnego)","Zastosowanie":"poporodowa bezmleczność u klaczy, leczenie ochwatu","Przeciwwskazania":"niedrożność przewodu pokarmowego","Niepożądane":"objawy rzadziej niż metoklopramid; ↑ uwalniania prolaktyny"}},{"n":"cyzapryd","k":2,"g":"Pokarmowy: prokinetyki, spazmolityki, na perystaltykę","p":{"Grupa":"prokinetyk","Mechanizm / skutek":"agonista rec. 5-HT4 w zwojach śródściennych jelit → ↑ ACh → ↑ napięcia zwieracza wpustu, przyspieszenie opróżniania żołądka, ↑ perystaltyki jelit","Zastosowanie":"refluks żołądkowo-przełykowy, zaburzenia opróżniania żołądka, zaparcia","Przeciwwskazania":"niedrożność przewodu pokarmowego, przełyk olbrzymi","Niepożądane":"ból brzucha, agresja, ataksja, gorączka, wymioty; brak hiperprolaktynemii i działania przeciwwymiotnego"}},{"n":"lidokaina","k":2,"g":"Pokarmowy: prokinetyki, spazmolityki, na perystaltykę","p":{"Grupa":"na perystaltykę","Mechanizm / skutek":"blokuje kanały sodowe (hamuje przewodzenie nerwowe), pobudza aktywność motoryczną jelit","Zastosowanie":"przywrócenie motoryki jelit po operacji, wymioty u koni"}},{"n":"papaweryna, drotaweryna","k":2,"g":"Pokarmowy: prokinetyki, spazmolityki, na perystaltykę","p":{"Grupa":"spazmolityki (papawerynopodobne)","Mechanizm / skutek":"hamują PDE → ↑ cAMP/cGMP → rozkurcz mięśni gładkich; blokują kanały wapniowe typu L (↓ Ca²⁺)","Zastosowanie":"stany spastyczne pp, dróg żółciowych, pęcherza, macicy","Niepożądane":"zaparcia, nudności, wymioty, brak łaknienia"}},{"n":"butylobromek skopolaminy","k":2,"g":"Pokarmowy: prokinetyki, spazmolityki, na perystaltykę","p":{"Grupa":"spazmolityk (parasympatykolityk)","Mechanizm / skutek":"blokada rec. M → rozkurcz mięśni gładkich; nie przechodzi bariery krew-mózg","Zastosowanie":"stany spastyczne pp"}},{"n":"tanina","k":2,"g":"Pokarmowy: przeciwbiegunkowe (zapierające)","p":{"Grupa":"środki ściągające","Mechanizm / skutek":"denaturacja śluzu i białek na powierzchni błony śluzowej → ↓ przesięku i wysięku, umiarkowany efekt przeciwzapalny","Zastosowanie":"nieżyty pokarmowe (doustnie), zatrucia alkaloidami i metalami, pędzlowanie błon śluzowych","Niepożądane":"długotrwale: ciężkie zaparcia i uszkodzenia wątroby"}},{"n":"związki bizmutu, węgiel leczniczy, kaolin, pektyny (kaopectate), atapulgit","k":2,"g":"Pokarmowy: przeciwbiegunkowe (zapierające)","p":{"Grupa":"środki adsorpcyjne i osłaniające","Mechanizm / skutek":"silnie wiążą substancje w pp (gazy, białka, bakterie, toksyny), zmieniają konsystencję kału","Zastosowanie":"objawowe leczenie biegunki, szczególnie w zakażeniach bakteryjnych pp","Niepożądane":"wymioty (aspiracja do płuc), zaparcia, czarny/zielonoczarny stolec; atapulgit bezpieczny dla kotów (nie wchłania się)"}},{"n":"difenoksylat (+ atropina), loperamid","k":2,"g":"Pokarmowy: przeciwbiegunkowe (zapierające)","p":{"Grupa":"hamujące perystaltykę (agoniści rec. opioidowych μ)","Mechanizm / skutek":"wiążą rec. opioidowe μ w jelitach → ↓ perystaltyki, ↓ uwalniania ACh i PG, ↑ resorpcji wody i elektrolitów, ↑ napięcia zwieracza odbytu","Zastosowanie":"objawowe leczenie biegunek z dużą utratą płynów","Przeciwwskazania":"biegunka infekcyjna (mogą ↑ wchłanianie toksyn), niedrożność jelit, czerwonka, rzekomobłoniaste zapalenie jelit","Niepożądane":"zaparcia (duże dawki), wpływ na OUN; loperamid silniejszy, nie przenika do OUN; difenoksylat + atropina — psy i koty"}},{"n":"diosmektyn","k":2,"g":"Pokarmowy: przeciwbiegunkowe (zapierające)","p":{"Grupa":"środki osłaniające błonę śluzową jelita","Mechanizm / skutek":"reaguje z glikoproteinami śluzu → ↑ wytrzymałości na czynniki drażniące; właściwości adsorbujące","Zastosowanie":"biegunki","Przeciwwskazania":"niedrożność jelit","Niepożądane":"nie wchłania się z pp"}},{"n":"otręby pszenne/żytnie, agar, guma arabska","k":2,"g":"Pokarmowy: przeczyszczające (na zaparcia)","p":{"Grupa":"zwiększające objętość mas kałowych","Mechanizm / skutek":"chłoną wodę → ↑ objętość; adsorbują kwasy żółciowe (↓ cholesterolu)","Zastosowanie":"zatwardzenie stolca","Niepożądane / PW":"bezpieczne"}},{"n":"siarczan magnezu, siarczan sodu, laktuloza","k":2,"g":"Pokarmowy: przeczyszczające (na zaparcia)","p":{"Grupa":"osmotyczne","Mechanizm / skutek":"↑ ciśnienie osmotyczne treści jelitowej (nie wchłaniane) → zatrzymują wodę → upłynnienie mas kałowych, rozciągnięcie ściany → skurcz; laktuloza obniża pH jelit","Zastosowanie":"zaparcia, laktuloza: zaparcia nawykowe, encefalopatia wątrobowa (psy)","Niepożądane / PW":"odwodnienie; małe zwierzęta/przeżuwacze; laktuloza ostrożnie przy cukrzycy"}},{"n":"olej rycynowy","k":2,"g":"Pokarmowy: przeczyszczające (na zaparcia)","p":{"Grupa":"środki drażniące","Mechanizm / skutek":"rozkładany przez kwasy żółciowe i lipazę do glicerolu i kwasu rycynolowego → mydła rycynolowe drażnią jelito cienkie","Zastosowanie":"zaparcia, opróżnienie jelit przed zabiegiem","Niepożądane / PW":"ciąża, wstrząs anafilaktyczny; hamuje wchłanianie wit. A, D, E, K; może wywołać wcześniejszy poród"}},{"n":"glikozydy antrachinonowe","k":2,"g":"Pokarmowy: przeczyszczające (na zaparcia)","p":{"Grupa":"środki drażniące","Mechanizm / skutek":"uwalniają emodynę → pobudza sploty śródścienne jelita grubego","Zastosowanie":"zaparcia (jelito grube)","Niepożądane / PW":"przewlekle: zwyrodnienie splotów międzymięśniowych, hamowanie perystaltyki"}},{"n":"bisakodyl","k":2,"g":"Pokarmowy: przeczyszczające (na zaparcia)","p":{"Grupa":"środki drażniące","Mechanizm / skutek":"drażni zakończenia neuronów błony śluzowej, ↓ próg pobudliwości → pobudza motorykę jelita grubego i wydzielanie wody/elektrolitów","Zastosowanie":"zaparcia, opróżnienie jelit","Niepożądane / PW":"choroby nerek; przewlekle uszkodzenie splotów jelitowych, utrata płynów; nie łączyć z alkalizującymi/mlekiem"}},{"n":"olej parafinowy","k":2,"g":"Pokarmowy: przeczyszczające (na zaparcia)","p":{"Grupa":"poślizgowe","Mechanizm / skutek":"↑ zawartość wody w kale, nadaje poślizg","Zastosowanie":"sondowanie (duże zwierzęta)","Niepożądane / PW":"stłuszczenie wątroby"}},{"n":"gliceryna/glicerol, czopki","k":2,"g":"Pokarmowy: przeczyszczające (na zaparcia)","p":{"Grupa":"poślizgowe / osmotyczne","Mechanizm / skutek":"ściąga wodę do treści jelitowej","Zastosowanie":"zaparcia","Niepożądane / PW":"odwodnienie"}},{"n":"menbuton","k":2,"g":"Pokarmowy: wątroba, apetyt, żwacz","p":{"Grupa":"żółciotwórczy / żółciopędny","Mechanizm / skutek":"silnie stymuluje czynności wydzielnicze wątroby, trzustki i gruczołów błony śluzowej pp → ↑ żółci, soku żołądkowego/trzustkowego; pośrednio pobudza motorykę","Zastosowanie":"zaburzenia trawienia i wydzielania wątroby/trzustki, wspomaganie w ketozie","Przeciwwskazania":"ostre zapalenie trzustki, zapalenie wątroby, niedrożność dróg żółciowych, niewydolność serca, gorączka, ostatni trymestr ciąży","Niepożądane":"ślinotok, potliwość, łzawienie, wzmożone oddawanie moczu i kału, zaleganie"}},{"n":"laktuloza","k":2,"g":"Pokarmowy: wątroba, apetyt, żwacz","p":{"Grupa":"hepatoprotekcyjny","Mechanizm / skutek":"migracja amoniaku z krwi do okrężnicy → jon amonowy wydalany z kałem (↓ amoniaku); działanie przeczyszczające, obniża pH jelit","Zastosowanie":"leczenie hiperamonemii (encefalopatia wątrobowa)","Przeciwwskazania":"cukrzyca (zawiera laktozę i galaktozę)","Niepożądane":"odwodnienie"}},{"n":"tymonacyk","k":2,"g":"Pokarmowy: wątroba, apetyt, żwacz","p":{"Grupa":"hepatoprotekcyjny","Mechanizm / skutek":"metabolizowany w wątrobie do N-formylocysteiny → unieczynnia toksyczne metabolity","Zastosowanie":"ochrona miąższu wątroby przed toksynami"}},{"n":"metionina, cysteina","k":2,"g":"Pokarmowy: wątroba, apetyt, żwacz","p":{"Grupa":"hepatoprotekcyjne","Mechanizm / skutek":"grupy sulfhydrylowe chronią wątrobę","Zastosowanie":"ochrona przed działaniem trucizn"}},{"n":"cholina, lecytyna","k":2,"g":"Pokarmowy: wątroba, apetyt, żwacz","p":{"Grupa":"hepatoprotekcyjne","Mechanizm / skutek":"przeciwdziałają stłuszczeniu wątroby"}},{"n":"mirtazapina, kapromorelina, diazepam, GKS, brotizolam","k":2,"g":"Pokarmowy: wątroba, apetyt, żwacz","p":{"Grupa":"pobudzające apetyt","Mechanizm / skutek":"mirtazapina — maść przezskórna dla kotów; kapromorelina — doustny dla kotów; diazepam — anorektyczne koty; brotizolam — krowy po zabiegach","Zastosowanie":"pobudzenie apetytu"}},{"n":"monezyna","k":2,"g":"Pokarmowy: wątroba, apetyt, żwacz","p":{"Grupa":"na żwacz (jonofor)","Mechanizm / skutek":"zmiana populacji drobnoustrojów (G+): ↓ bakterii produkujących octany/maślany, ↑ produkujących propioniany (prekursory glukoneogenezy) → ↑ wydajności energetycznej, ↓ ciał ketonowych","Zastosowanie":"↓ częstotliwości ketozy u krów mlecznych i jałówek okołoporodowych"}},{"n":"dimetykon, oleje roślinne, wodorowęglan Na, tlenek Mg","k":2,"g":"Pokarmowy: wątroba, apetyt, żwacz","p":{"Grupa":"przeciwwzdęciowe / na żwacz","Mechanizm / skutek":"środki przeciwpienne (dimetykon, oleje); neutralizujące kwaśną treść żwacza (wodorowęglan Na, tlenek Mg); zakwaszające (kwas octowy, mlekowy)","Zastosowanie":"wzdęcia, kwasica/zasadowica żwacza","Niepożądane":"parasympatykomimetyki pobudzają ruchy żwacza"}},{"n":"morfina","k":2,"g":"Oddechowy: leki przeciwkaszlowe ośrodkowe i obwodowe","p":{"Mechanizm":"czysty agonista rec. μ (słaby δ i κ); ↓ cAMP → otwarcie kanałów K⁺, zamknięcie Ca²⁺ → hiperpolaryzacja, ↓ uwalniania neuroprzekaźników; depresyjny wpływ na ośrodek kaszlu","Zastosowanie":"efekt przeciwkaszlowy (mniejsze dawki niż przeciwbólowe), zranienie opłucnej","Przeciwwskazania":"depresja oddechowa, drgawki, padaczka","Niepożądane":"wymioty, ślinotok, zaparcia, skurcz oskrzeli, bradykardia, ↓ ciśnienia, depresja oddechowa, sedacja/pobudzenie","Dodatkowe":"s.c./doustnie/i.m.; gdy kodeina nieskuteczna"}},{"n":"kodeina","k":2,"g":"Oddechowy: leki przeciwkaszlowe ośrodkowe i obwodowe","p":{"Mechanizm":"hamuje ośrodek kaszlu (słabiej od morfiny), zwiększa lepkość wydzieliny oskrzelowej","Zastosowanie":"silny środek przeciwkaszlowy (dawki przeciwkaszlowe niższe od przeciwbólowych)","Przeciwwskazania":"kaszel mokry, depresja oddechowa, ciężkie zaparcia","Niepożądane":"zaparcia, hamowanie oddychania, uzależnienie","Dodatkowe":"głównie u psów; często z paracetamolem/ASA; doustnie — wysoka biodostępność"}},{"n":"butorfanol","k":2,"g":"Oddechowy: leki przeciwkaszlowe ośrodkowe i obwodowe","p":{"Mechanizm":"agonista κ, antagonista μ","Zastosowanie":"silnie przeciwkaszlowo (silniej od kodeiny i morfiny), przeciwbólowo, przeciwwymiotnie; przewlekły suchy kaszel u psów","Przeciwwskazania":"schorzenia wątroby, choroba Addisona, niewydolność nerek i tarczycy, urazy głowy","Niepożądane":"depresja oddechowa, ataksja, nasila działanie histaminy (alergie), anoreksja, biegunka","Dodatkowe":"doustnie i parenteralnie (psy, koty); szeroki margines bezpieczeństwa"}},{"n":"etylomorfina","k":2,"g":"Oddechowy: leki przeciwkaszlowe ośrodkowe i obwodowe","p":{"Mechanizm":"agonista rec. μ (mniej κ i δ) — hamuje ośrodek kaszlu","Zastosowanie":"działanie przeciwkaszlowe, przeciwbólowe","Przeciwwskazania":"niewydolność oddechowa, astma w ostrym napadzie, depresja oddechowa, niewydolność wątroby","Niepożądane":"odurzenie, uzależnienia, depresja oddechowa, senność, zawroty głowy, ↓ ciśnienia, nudności","Dodatkowe":"stosowana u psów"}},{"n":"dekstrometorfan","k":2,"g":"Oddechowy: leki przeciwkaszlowe ośrodkowe i obwodowe","p":{"Mechanizm":"hamuje ośrodek kaszlu; antagonista rec. NMDA, hamuje wychwyt zwrotny serotoniny i noradrenaliny; brak działania przeciwbólowego i depresji oddechowej","Zastosowanie":"suchy kaszel","Przeciwwskazania":"astma (uwalnia histaminę), alergia, kaszel z mokrą wydzieliną, niewydolność wątroby","Niepożądane":"senność, zawroty głowy, wymioty, tachykardia, świąd, wysypka","Dodatkowe":"siła jak kodeina, dobrze wchłaniany z pp; psy i koty"}},{"n":"noskapina","k":2,"g":"Oddechowy: leki przeciwkaszlowe ośrodkowe i obwodowe","p":{"Mechanizm":"alkaloid izochinolinowy opium — hamuje ośrodek kaszlu (kanały wapniowe), nie hamuje oddechu (nie działa na rec. opioidowe)","Zastosowanie":"suchy kaszel; przeciwkaszlowo + słabo spazmolitycznie","Przeciwwskazania":"nadwrażliwość, ciąża, niewydolność wątroby, niedociśnienie","Niepożądane":"sedacja, senność, nudności, ↓ ciśnienia","Dodatkowe":"tylko u małych zwierząt"}},{"n":"butamirat","k":2,"g":"Oddechowy: leki przeciwkaszlowe ośrodkowe i obwodowe","p":{"Mechanizm":"hamuje ośrodek kaszlu (nie opioidowo — brak depresji oddechowej), słabe rozkurczowe na oskrzela, upłynnia wydzielinę","Zastosowanie":"kaszel suchy i mokry, pooperacyjny","Przeciwwskazania":"nadwrażliwość, ciąża, karmienie","Niepożądane":"biegunka, senność, wysypka, świąd, ↓ ciśnienia","Dodatkowe":"3× silniej niż kodeina"}},{"n":"okseladyna","k":2,"g":"Oddechowy: leki przeciwkaszlowe ośrodkowe i obwodowe","p":{"Mechanizm":"hamuje ośrodek kaszlu (słabiej niż opioidy), słabe przeciwhistaminowe i cholinolityczne; nie uzależnia, nie działa depresyjnie","Zastosowanie":"suchy kaszel, alergiczny","Przeciwwskazania":"jaskra, przerost prostaty z nietrzymaniem moczu","Niepożądane":"senność, suchość w ustach, nudności, tachykardia, zaparcia"}},{"n":"pentoksyweryna","k":2,"g":"Oddechowy: leki przeciwkaszlowe ośrodkowe i obwodowe","p":{"Mechanizm":"hamuje ośrodek kaszlu, słabe miejscowo znieczulające i cholinolityczne","Zastosowanie":"kaszel suchy"}},{"n":"dimetoksanat, flubron, oksomemazyna (fenotiazyny)","k":2,"g":"Oddechowy: leki przeciwkaszlowe ośrodkowe i obwodowe","p":{"Mechanizm":"antagonizm rec. H1 w OUN → ↓ podrażnienia dróg oddechowych, ↓ pobudliwości ośrodka kaszlu","Zastosowanie":"kaszel alergiczny, katar sienny; przeciwkaszlowe, uspokajające, miejscowo znieczulające","Przeciwwskazania":"jaskra, przerost prostaty, padaczka, depresja OUN","Niepożądane":"senność, suchość w ustach, zaparcia, zatrzymanie moczu, ↓ ciśnienia","Dodatkowe":"syrop/tabletki dla psów"}},{"n":"benzonatat, klofedanol","k":2,"g":"Oddechowy: leki przeciwkaszlowe ośrodkowe i obwodowe","p":{"Mechanizm":"działanie obwodowe — wpływają na zakończenia czuciowe w oskrzelach","Zastosowanie":"przed zabiegami","Dodatkowe":"śluzy roślinne — łagodząco/osłaniająco"}},{"n":"jodek potasu","k":2,"g":"Oddechowy: leki wykrztuśne i mukolityki","p":{"Mechanizm":"drażni błonę śluzową żołądka → odruchowo ↑ wydzielanie gruczołów oskrzelowych; gromadzi się też w tarczycy, śliniankach","Zastosowanie":"kaszel mokry, przewlekłe zapalenie oskrzeli, stany po zapaleniu płuc z zalegającą wydzieliną","Przeciwwskazania":"nadczynność tarczycy, zaawansowana ciąża","Niepożądane":"obrzęk ślinianek, jodzica, zaburzenia pp, wpływ na tarczycę","Dodatkowe":"nie łączyć z innymi lekami wykrztuśnymi"}},{"n":"związki kreozotu (gwajakol)","k":2,"g":"Oddechowy: leki wykrztuśne i mukolityki","p":{"Mechanizm":"drażni śluzówkę żołądka (odruchowo) + po wchłonięciu drażni śluzówkę oskrzeli","Zastosowanie":"stany zapalne oskrzeli, kaszel mokry","Przeciwwskazania":"choroba wrzodowa, zapalenie żołądka, krwawienia z pp, kaszel suchy","Niepożądane":"wysypka, świąd, nudności, wymioty, senność, zawroty głowy","Dodatkowe":"oleisty płyn; nie łączyć z lekami przeciwkaszlowymi"}},{"n":"gwajfenezyna","k":2,"g":"Oddechowy: leki wykrztuśne i mukolityki","p":{"Mechanizm":"pobudza gruczoły oskrzelowe, ↑ ilości wydzieliny, ↓ lepkości, ułatwia transport rzęskowy","Zastosowanie":"kaszel mokry, przewlekłe zapalenie oskrzeli","Przeciwwskazania":"choroby pp"}},{"n":"wodorowęglan sodu","k":2,"g":"Oddechowy: leki wykrztuśne i mukolityki","p":{"Mechanizm":"uwalnia HCO₃⁻ → ↑ pH wydzieliny → upłynnienie, ↓ lepkości","Zastosowanie":"kaszel mokry, przewlekłe zapalenie oskrzeli, mukowiscydoza","Przeciwwskazania":"skłonność do zasadowicy metabolicznej, niewydolność nerek","Niepożądane":"wzdęcia, zgaga, nudności, alkaloza metaboliczna","Dodatkowe":"alkalizuje sok żołądkowy i mocz"}},{"n":"chlorek amonu","k":2,"g":"Oddechowy: leki wykrztuśne i mukolityki","p":{"Mechanizm":"drażni błonę śluzową pp (nerw błędny), ↑ wydzieliny i ją zakwasza; w większych dawkach moczopędnie","Zastosowanie":"kaszel z gęstą wydzieliną, przewlekłe zapalenie oskrzeli","Przeciwwskazania":"choroby pp, niewydolność nerek","Niepożądane":"podrażnienie pp, hiperwentylacja, kwasica, obrzęk płuc","Dodatkowe":"2% roztwory do inhalacji lub doustnie"}},{"n":"acetylocysteina","k":2,"g":"Oddechowy: leki wykrztuśne i mukolityki","p":{"Mechanizm":"rozrywa wiązania dwusiarczkowe w polipeptydach śluzu → ↓ lepkości (z metabolitem cysteiną)","Zastosowanie":"schorzenia z lepką wydzieliną; antidotum w zatruciu paracetamolem","Przeciwwskazania":"wrzody, astma (skurcz oskrzeli)","Niepożądane":"nieprzyjemny smak, drażnienie dróg oddechowych, nudności, wymioty","Dodatkowe":"inhalacje/doustnie; nie przed snem (indukuje kaszel); nie z penicyliną, tetracykliną, cefalosporyną, aminoglikozydami (inaktywuje)"}},{"n":"karbocysteina","k":2,"g":"Oddechowy: leki wykrztuśne i mukolityki","p":{"Mechanizm":"stymuluje wytwarzanie śluzu o niskiej lepkości, hamuje o wysokiej (nie reaguje bezpośrednio ze śluzem)"}},{"n":"mesna","k":2,"g":"Oddechowy: leki wykrztuśne i mukolityki","p":{"Mechanizm":"rozrywa wiązania dwusiarczkowe w mucynie → ↓ lepkości śluzu","Dodatkowe":"mniej DN niż pochodne cysteiny; aerozol/wlewy; nie z aminoglikozydami"}},{"n":"bromheksyna, dembreksyna, ambroksol","k":2,"g":"Oddechowy: leki wykrztuśne i mukolityki","p":{"Mechanizm":"rozrzedzają śluz, pobudzają rzęski, ↑ syntezę surfaktantu; ambroksol — ↑ penetracji antybiotyku, antyoksydacyjnie","Zastosowanie":"ostre i przewlekłe zapalenie oskrzeli, mukowiscydoza, stany po zapaleniu płuc, kaszel mokry; ambroksol — zapalenie zatok, ucha","Przeciwwskazania":"kaszel suchy, wrzody","Niepożądane":"nudności, wymioty, wysypka, świąd, zawroty głowy","Dodatkowe":"czynny metabolit bromheksyny = ambroksol; dembreksyna — konie; doustnie/pozajelitowo"}},{"n":"tyloksapol, surfaktant, dornaza alfa","k":2,"g":"Oddechowy: leki wykrztuśne i mukolityki","p":{"Mechanizm":"detergenty / enzymy — obniżają napięcie powierzchniowe (tyloksapol); surfaktant naturalny; dornaza hydrolizuje DNA w plwocinie","Zastosowanie":"torakochirurgia, profilaktyka zaburzeń oddychania, mukowiscydoza","Dodatkowe":"wziewnie/dotchawiczo; dornaza rzadko stosowana"}},{"n":"glikokortykosteroidy (wziewne: flutikazon, beklometazon, budezonid; doustne: prednizolon; szybkie: deksametazon, metyloprednizolon)","k":2,"g":"Oddechowy: leki przeciwastmatyczne","p":{"Mechanizm":"łączą się z rec. cytozolowymi → ekspresja genów; ↑ lipokortyny → hamują fosfolipazę A2 → ↓ PG i leukotrienów; ↑ gęstości rec. β2; hamują cytokiny prozapalne (IL-4,5,13), degranulację mastocytów","Skutek":"↓ skurczu oskrzeli (nie rozkurczają), hamowanie późnej fazy reakcji alergicznej i nadreaktywności; przeciwdziałają przebudowie oskrzeli","Przeciwwskazania":"cukrzyca, aktywne zakażenia grzybicze, zakażenia jamy ustnej/gardła, jaskra, zaćma, osteoporoza, choroba wrzodowa","Niepożądane":"kandydoza jamy ustnej, chrypka, zapalenie gardła, kaszel, osteoporoza, zaćma, jaskra, cukrzyca posteroidowa","Dodatkowe":"najskuteczniejsze; najlepiej wziewnie; podawać rano (pies) / wieczorem (kot); nie powodują trwałego wyleczenia"}},{"n":"cyklezonid","k":2,"g":"Oddechowy: leki przeciwastmatyczne","p":{"Mechanizm":"prolek aktywowany do descyklezonidu w komórkach nabłonka dróg oddechowych — działa przeciwzapalnie tylko miejscowo","Skutek":"↓ obrzęku śluzówki, produkcji śluzu, nadreaktywności oskrzeli","Przeciwwskazania":"jak GKS","Niepożądane":"jak GKS (minimalne — działanie miejscowe)","Dodatkowe":"bardzo bezpieczny, przedłużone działanie, dobrze tolerowany; wziewnie"}},{"n":"β2-sympatykomimetyki — SABA krótkie (salbutamol, klenbuterol, fenoterol, terbutalina, rimiterol); LABA długie (salmeterol, formoterol, bambuterol)","k":2,"g":"Oddechowy: leki przeciwastmatyczne","p":{"Mechanizm":"stymulują rec. β2 → spadek stężenia wapnia → rozkurcz mięśni oskrzeli; hamowanie uwalniania mediatorów; ↑ klirensu śluzowo-rzęskowego","Skutek":"rozkurcz oskrzeli, pośrednie działanie przeciwzapalne, poprawa czynności przepony","Przeciwwskazania":"tachykardia, nadciśnienie, nadczynność tarczycy, cukrzyca, hipokaliemia, ciąża","Niepożądane":"hipokaliemia, hiperglikemia, hipomagnezemia, ↑ ciśnienia, tachykardia, martwica mięśnia sercowego, relaksacja macicy","Dodatkowe":"SABA — doraźnie; LABA — przewlekle; tachyfilaksja (odwracalna) i sekwestracja (nieodwracalna); GKS hamują tachyfilaksję; klenbuterol — konie, bydło"}},{"n":"klenbuterol","k":2,"g":"Oddechowy: leki przeciwastmatyczne","p":{"Mechanizm":"β2-mimetyk","Skutek":"rozkurcz oskrzeli","Przeciwwskazania":"ostre i podostre choroby układu oddechowego ze skurczem oskrzeli, POChP koni; zaawansowana ciąża (osłabia parcia)","Niepożądane":"pobudzenie akcji serca, rozszerzenie naczyń, drżenia mięśni, pocenie koni","Dodatkowe":"konie i bydło; długi czas działania; doustnie/i.v./i.m."}},{"n":"cholinolityki: bromek ipratropium, bromek oksytropium, tiotropium","k":2,"g":"Oddechowy: leki przeciwastmatyczne","p":{"Mechanizm":"blokują rec. muskarynowe (konkurencja z ACh) → zapobiegają skurczowi oskrzeli wywołanemu ACh","Skutek":"rozkurcz oskrzeli, ↓ wydzielania śluzu","Przeciwwskazania":"jaskra, niedrożność jelit, przerost prostaty, ciąża","Niepożądane":"suchość w ustach, kaszel, podrażnienie gardła, tachykardia, zatrzymanie moczu, zaburzenia widzenia","Dodatkowe":"leki wspomagające"}},{"n":"metyloksantyny: teofilina (jedyna w wet.), aminofilina, diprofilina, etamifilina","k":2,"g":"Oddechowy: leki przeciwastmatyczne","p":{"Mechanizm":"hamowanie PDE → ↑ cAMP w mięśniach gładkich → rozkurcz; blokują rec. adenozynowe A1/A2; hamują gromadzenie wapnia i degranulację komórek tucznych; stymulują uwalnianie katecholamin","Skutek":"rozszerzenie oskrzeli, słabe przeciwzapalne, ↓ duszności; pobudza ośrodek oddechowy, działanie moczopędne","Przeciwwskazania":"nadczynność tarczycy, choroba wrzodowa, niewydolność wątroby, niedokrwienie serca, świeży zawał, tachyarytmie, ciąża","Niepożądane":"bezsenność, drżenia, tachykardia, arytmie, wymioty, hipokaliemia, hiperglikemia, drgawki","Dodatkowe":"niski wskaźnik terapeutyczny; pomocniczo, gdy nie można GKS lub β2; konieczne wysokie stężenie we krwi"}},{"n":"kromoglikan disodowy (kromony)","k":2,"g":"Oddechowy: leki przeciwastmatyczne","p":{"Mechanizm":"hamuje napływ wapnia do mastocytów → stabilizuje je → hamuje degranulację","Skutek":"profilaktycznie — leczenie pomocnicze w astmie lekkiej","Niepożądane":"kaszel (podanie wziewne)","Dodatkowe":"wziewnie; nie działa w zaawansowanej astmie"}},{"n":"cyproheptadyna","k":2,"g":"Oddechowy: leki przeciwastmatyczne","p":{"Mechanizm":"lek przeciwhistaminowy; w astmie działa przeciwserotoninowo — antagonista rec. 5-HT1A i 5-HT2A (5-HT to główny mediator napadów astmy u kotów)","Skutek":"przeciwzapalne","Dodatkowe":"u kotów; gdy nie można użyć GKS; w skojarzeniu z salbutamolem/terbutaliną; zapobiegawczo"}},{"n":"leki przeciwleukotrienowe","k":2,"g":"Oddechowy: leki przeciwastmatyczne","p":{"
