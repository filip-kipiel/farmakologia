Mechanizm":"blokują receptor dla leukotrienów cysteinylowych","Skutek":"(pomocniczo w każdym okresie astmy)","Dodatkowe":"leczenie kontrolujące"}},{"n":"prokaina","k":2,"g":"Leki MIEJSCOWO ZNIECZULAJĄCE","p":{"Grupa":"estry","Mechanizm / skutek":"hamuje przewodzenie nerwowe przez blokadę kanałów sodowych → zatrzymanie rozprzestrzeniania potencjału","Zastosowanie":"znieczulenie nasiękowe, okołonerwowe i rdzeniowe","Przeciwwskazania":"podanie dożylne lub dostawowe, zaburzenia krążenia, stan wstrząsu, leczenie sulfonamidami, uszy/ogon/prącie","Niepożądane":"pobudzenie OUN (niepokój, drgawki, depresja oddechowa), zaburzenia układu krążenia, działania neurotoksyczne, martwica mięśni","Dodatkowe":"działa 30–60 min (z adrenaliną nawet 120 min); konie wrażliwe"}},{"n":"lidokaina","k":2,"g":"Leki MIEJSCOWO ZNIECZULAJĄCE","p":{"Grupa":"amid","Mechanizm / skutek":"jw. (blokada kanałów sodowych); także lek przeciwarytmiczny","Zastosowanie":"znieczulenia powierzchniowe, nasiękowe, okołonerwowe, zewnątrzoponowe, dostawowe","Przeciwwskazania":"tkanka zakażona, noworodki, dożylne podanie","Niepożądane":"niezborność ruchowa, reakcje nadwrażliwości, zaburzenia przewodzenia serca, ↓ ciśnienia, opóźnione gojenie ran","Dodatkowe":"czas działania 60–120 min; działa silniej, szybciej i dłużej od prokainy"}},{"n":"mepiwakaina","k":2,"g":"Leki MIEJSCOWO ZNIECZULAJĄCE","p":{"Grupa":"amid","Mechanizm / skutek":"jw. (blokada kanałów sodowych)","Zastosowanie":"znieczulenia dostawowe i zewnątrzoponowe","Przeciwwskazania":"dożylne podanie","Niepożądane":"obrzęk tkanek, wpływ na OUN","Dodatkowe":"działanie ok. 60 min"}},{"n":"Penicyliny naturalne (benzylopenicylina / penicylina G, penicylina prokainowa, benzatynowa, fenoksymetylopenicylina = penicylina V)","k":3,"g":"Inhibitory syntezy ściany komórkowej — BETALAKTAMY (+ inhibitory β-laktamaz)","p":{"Spektrum":"wąskie: głównie G+ (ziarniaki), krętki, niektóre beztlenowce","Zastosowanie":"zakażenia G+, krętkowice; preparaty depot (prokainowa, benzatynowa) dla wydłużonego działania","Oporność":"wrażliwe na β-laktamazy (penicylinazy)","Uwagi / DN / interakcje":"penicylina G nietrwała w kwaśnym pH żołądka (podanie pozajelitowe); reakcje alergiczne; penicylina V kwasoodporna (doustnie)"}},{"n":"Penicyliny półsyntetyczne penicylinazooporne (kloksacylina, dikloksacylina, oksacylina, metycylina, nafcylina)","k":3,"g":"Inhibitory syntezy ściany komórkowej — BETALAKTAMY (+ inhibitory β-laktamaz)","p":{"Spektrum":"G+ wytwarzające penicylinazy (gronkowce)","Zastosowanie":"zakażenia gronkowcowe","Oporność":"oporne na penicylinazy; MRSA oporne (zmiana PBP)"}},{"n":"Aminopenicyliny (ampicylina, amoksycylina)","k":3,"g":"Inhibitory syntezy ściany komórkowej — BETALAKTAMY (+ inhibitory β-laktamaz)","p":{"Spektrum":"poszerzone: G+ i część G- (E. coli, Proteus, Salmonella)","Zastosowanie":"szerokie zakażenia, układ moczowy, pokarmowy, oddechowy","Oporność":"wrażliwe na β-laktamazy (stąd łączone z inhibitorami)","Uwagi / DN / interakcje":"amoksycylina lepiej wchłaniana doustnie niż ampicylina"}},{"n":"Karboksypenicyliny / ureidopenicyliny (karbenicylina, tikarcylina, piperacylina, azlocylina)","k":3,"g":"Inhibitory syntezy ściany komórkowej — BETALAKTAMY (+ inhibitory β-laktamaz)","p":{"Spektrum":"poszerzone o Pseudomonas i inne G-","Zastosowanie":"ciężkie zakażenia G- (w tym Pseudomonas)","Oporność":"wrażliwe na β-laktamazy","Uwagi / DN / interakcje":"często łączone z inhibitorami β-laktamaz"}},{"n":"Inhibitory β-laktamaz (kwas klawulanowy, sulbaktam, tazobaktam)","k":3,"g":"Inhibitory syntezy ściany komórkowej — BETALAKTAMY (+ inhibitory β-laktamaz)","p":{"Spektrum":"brak własnego istotnego spektrum","Zastosowanie":"łączone z penicylinami (np. amoksycylina + kwas klawulanowy; ampicylina + sulbaktam; piperacylina + tazobaktam) — przywracają aktywność wobec szczepów β-laktamazo-dodatnich","Uwagi / DN / interakcje":"nieodwracalnie wiążą i inaktywują β-laktamazy („samobójcze” inhibitory)"}},{"n":"Cefalosporyny I generacji (cefaleksyna, cefadroksyl, cefazolina, cefapiryna, cefadroksyl)","k":3,"g":"Inhibitory syntezy ściany komórkowej — BETALAKTAMY (+ inhibitory β-laktamaz)","p":{"Spektrum":"głównie G+, słabiej G-","Zastosowanie":"zakażenia skóry i tkanek miękkich, profilaktyka chirurgiczna","Oporność":"β-laktamazy","Uwagi / DN / interakcje":"reakcje alergiczne (krzyżowe z penicylinami); wzrost aktywności od I do III gen. wobec G-, spadek wobec G+"}},{"n":"Cefalosporyny II generacji (cefuroksym, cefaklor) + cefamycyny (cefoksytyna)","k":3,"g":"Inhibitory syntezy ściany komórkowej — BETALAKTAMY (+ inhibitory β-laktamaz)","p":{"Spektrum":"G+ i poszerzone G-; cefamycyny dodatkowo beztlenowce","Zastosowanie":"zakażenia mieszane","Oporność":"cefamycyny bardziej oporne na β-laktamazy"}},{"n":"Cefalosporyny III generacji (cefotaksym, ceftriakson, ceftazydym, cefovecyna, cefpodoksym, ceftiofur)","k":3,"g":"Inhibitory syntezy ściany komórkowej — BETALAKTAMY (+ inhibitory β-laktamaz)","p":{"Spektrum":"szerokie G-, słabiej G+; ceftazydym aktywny wobec Pseudomonas","Zastosowanie":"ciężkie zakażenia G-; ceftiofur/cefovecyna — weterynaryjne","Oporność":"β-laktamazy o rozszerzonym spektrum (ESBL)","Uwagi / DN / interakcje":"cefovecyna — długie działanie (PLW dla psów/kotów); dobra penetracja do OUN (cefotaksym, ceftriakson)"}},{"n":"Cefalosporyny IV generacji (cefepim, cefquinom)","k":3,"g":"Inhibitory syntezy ściany komórkowej — BETALAKTAMY (+ inhibitory β-laktamaz)","p":{"Spektrum":"bardzo szerokie: G+ i G- (w tym Pseudomonas)","Zastosowanie":"ciężkie zakażenia szpitalne / weterynaryjne (cefquinom)","Oporność":"oporne na wiele β-laktamaz"}},{"n":"Cefalosporyny V generacji (ceftarolina, ceftobiprol)","k":3,"g":"Inhibitory syntezy ściany komórkowej — BETALAKTAMY (+ inhibitory β-laktamaz)","p":{"Spektrum":"szerokie + MRSA","Zastosowanie":"zakażenia MRSA"}},{"n":"Karbapenemy (imipenem, meropenem, ertapenem, dorypenem)","k":3,"g":"Inhibitory syntezy ściany komórkowej — BETALAKTAMY (+ inhibitory β-laktamaz)","p":{"Spektrum":"bardzo szerokie: G+, G-, beztlenowce","Zastosowanie":"ciężkie zakażenia wielolekooporne („antybiotyki ostatniej szansy”)","Oporność":"karbapenemazy","Uwagi / DN / interakcje":"imipenem podawany z cylastatyną (hamuje dehydropeptydazę nerkową); ryzyko drgawek"}},{"n":"Monobaktamy (aztreonam)","k":3,"g":"Inhibitory syntezy ściany komórkowej — BETALAKTAMY (+ inhibitory β-laktamaz)","p":{"Spektrum":"tylko tlenowe G- (w tym Pseudomonas)","Zastosowanie":"zakażenia G- u uczulonych na inne β-laktamy","Uwagi / DN / interakcje":"brak reaktywności krzyżowej alergicznej z penicylinami"}},{"n":"wankomycyna","k":3,"g":"Inhibitory syntezy ściany komórkowej — pozostałe mechanizmy (glikopeptydy, bacytracyna, fosfomycyna)","p":{"Grupa":"glikopeptydy","Mechanizm":"blokuje ostatni etap syntezy ściany komórkowej — procesy transglikozylacji i transpeptydacji","Efekt":"bakteriobójczy, czasozależny","Spektrum":"tlenowe ziarenkowce G+, beztlenowe laseczki Clostridium, MRSA","Zastosowanie":"rzekomobłoniaste zapalenie jelit","Uwagi / DN / interakcje / kat.":"kat. A — głównie dla ludzi, brak danych o działaniu u zwierząt"}},{"n":"bacytracyna, gramicydyna","k":3,"g":"Inhibitory syntezy ściany komórkowej — pozostałe mechanizmy (glikopeptydy, bacytracyna, fosfomycyna)","p":{"Grupa":"cykliczne (peptydowe)","Mechanizm":"punkt uchwytu w błonie komórkowej i wpływ na transport przezbłonowy; hamowanie biosyntezy ściany komórkowej (zapobiega tworzeniu nici peptydoglikanu); działanie bakteriobójcze wymaga obecności kationów dwuwartościowych (cynk)","Efekt":"bakteriobójcze (oporność rozwija się powoli)","Spektrum":"G+; gramicydyna ma poszerzone spektrum o mycobacterium i candida","Zastosowanie":"zakażenia skóry, owrzodzenia, zakażenia ucha zewnętrznego, zakażenia spojówki, rogówki i wymienia","Uwagi / DN / interakcje / kat.":"nie wchłania się z pp; PW: choroby nerek; DN: nefrotoksyczne, reakcje nadwrażliwości; kat. D"}},{"n":"fosfomycyna","k":3,"g":"Inhibitory syntezy ściany komórkowej — pozostałe mechanizmy (glikopeptydy, bacytracyna, fosfomycyna)","p":{"Mechanizm":"hamowanie syntezy ściany komórkowej bakterii poprzez inaktywację transferazy fosfoenolopirogronianowej — hamuje nieodwracalnie kondensację pochodnych N-acetyloglukozaminy z fosfoenolopirogronianem","Efekt":"bakteriobójczo","Spektrum":"G+, G-","Zastosowanie":"zakażenia DM niepowikłane, zapalenie pęcherza moczowego, bezobjawowy bakteriomocz (np. w ciąży), profilaktyka zakażeń układu moczowego przed zabiegami chirurgicznymi, przezcewkowymi i diagnostycznymi","Uwagi / DN / interakcje / kat.":"DN: nudności, biegunka, zgaga, bóle brzucha, osłabienie, bóle i zawroty głowy"}},{"n":"erytromycyna","k":3,"g":"Inhibitory syntezy białka — podjednostka 50S rybosomu","p":{"Grupa":"makrolidy C14","Efekt / spektrum":"bakteriostatyczny (50S); G+, atypowe, część G-, Campylobacter","Oporność":"fenotyp MLSB (metylacja 50S)","Zastosowanie":"zakażenia G+, DO, mykoplazmy, kampylobakterioza","DN / PW":"zaburzenia pp (prokinetyk — pobudza receptory motyliny); u koni/przeżuwaczy ryzyko ciężkich zaburzeń pp","Interakcje / uwagi":"inhibitor cytochromu P450 (interakcje)"}},{"n":"roksytromycyna, klarytromycyna","k":3,"g":"Inhibitory syntezy białka — podjednostka 50S rybosomu","p":{"Grupa":"makrolidy C14","Efekt / spektrum":"bakteriostatyczny (50S); lepsza biodostępność i tolerancja niż erytromycyna","Oporność":"MLSB","Zastosowanie":"zakażenia G+, atypowe, DO","DN / PW":"mniej zaburzeń pp niż erytromycyna","Interakcje / uwagi":"klarytromycyna — silny inhibitor P450"}},{"n":"azytromycyna","k":3,"g":"Inhibitory syntezy białka — podjednostka 50S rybosomu","p":{"Grupa":"makrolidy C15 (azalidy)","Efekt / spektrum":"bakteriostatyczny (50S); poszerzone o G-, długi t½, kumulacja w tkankach","Oporność":"MLSB","Zastosowanie":"zakażenia tkankowe, wewnątrzkomórkowe","DN / PW":"dobra tolerancja","Interakcje / uwagi":"długie działanie tkankowe (dawkowanie rzadkie)"}},{"n":"spiramycyna, jozamycyna","k":3,"g":"Inhibitory syntezy białka — podjednostka 50S rybosomu","p":{"Grupa":"makrolidy C16","Efekt / spektrum":"bakteriostatyczny (50S); G+, atypowe","Oporność":"MLSB (C16 częściowo wymyka się indukcyjnej oporności)","Zastosowanie":"zakażenia G+, jamy ustnej, toksoplazmoza (spiramycyna)","Interakcje / uwagi":"synergizm spiramycyna + metronidazol (stomatologia)"}},{"n":"tylozyna, tilmikozyna, gamitromycyna, tulatromycyna","k":3,"g":"Inhibitory syntezy białka — podjednostka 50S rybosomu","p":{"Grupa":"makrolidy weterynaryjne","Efekt / spektrum":"bakteriostatyczny (50S); G+, mykoplazmy","Oporność":"MLSB","Zastosowanie":"zakażenia DO i mykoplazmozy bydła/świń/drobiu; gamitromycyna — długodziałający","DN / PW":"tilmikozyna — kardiotoksyczna (przy podaniu dożylnym/iniekcji ryzyko zgonu, zwłaszcza świnie)","Interakcje / uwagi":"synergizm tylozyna + oksytetracyklina"}},{"n":"linkomycyna","k":3,"g":"Inhibitory syntezy białka — podjednostka 50S rybosomu","p":{"Grupa":"linkozamidy","Efekt / spektrum":"bakteriostatyczny (50S); G+, beztlenowce","Oporność":"MLSB (krzyżowa z makrolidami)","Zastosowanie":"zakażenia G+, beztlenowcowe, kości/stawy","DN / PW":"u koni, królików, przeżuwaczy, chomików — ciężkie, śmiertelne zaburzenia pp (zapalenie jelit)","Interakcje / uwagi":"antagonizm z makrolidami (wspólne miejsce 50S)"}},{"n":"klindamycyna","k":3,"g":"Inhibitory syntezy białka — podjednostka 50S rybosomu","p":{"Grupa":"linkozamidy","Efekt / spektrum":"bakteriostatyczny (50S); G+, beztlenowce, niektóre pierwotniaki (Toxoplasma)","Oporność":"MLSB","Zastosowanie":"zakażenia skóry, kości, jamy ustnej, ropnie, toksoplazmoza, beztlenowce","DN / PW":"jw. ryzyko zaburzeń pp u gatunków wrażliwych (koń, królik)","Interakcje / uwagi":"antagonizm z makrolidami"}},{"n":"chloramfenikol (detreomycyna, chloromycetyna)","k":3,"g":"Inhibitory syntezy białka — podjednostka 50S rybosomu","p":{"Grupa":"fenikole","Efekt / spektrum":"bakteriostatyczny; hamuje biosyntezę białka na 50S; G+, G-, riketsje","Oporność":"acetylotransferaza (acet  alternatywa"}},{"n":"tokeranib","k":4,"g":"INHIBITORY KINAZ","p":{"Grupa":"inhibitor kinazy tyrozynowej","Mechanizm":"hamuje VEGFR2, PDGFR, c-Kit — działanie przeciwnowotworowe i antyangiogenne","Zastosowanie":"nieoperacyjne, nawracające guzy komórek tucznych II/III u psów","Przeciwwskazania":"ciąża, laktacja, psy <2 lat lub <3 kg, psy do hodowli; NIE z NLPZ ani GKS","Działania niepożądane":"anoreksja, biegunka, krwawienia z pp, hipoalbuminemia, neutropenia, niedokrwistość, nefro-/hepatotoksyczność, kulawizny, wyłysienia, wstrząs"}},{"n":"masytynib (Masivet)","k":4,"g":"INHIBITORY KINAZ","p":{"Grupa":"inhibitor kinazy białkowo-tyrozynowej","Mechanizm":"blokuje c-KIT, PDGF, FGFR3 → hamuje podziały kom. tucznych","Zastosowanie":"guzy komórek tucznych u psów","Przeciwwskazania":"ciąża/laktacja, psy <6 mż lub <4 kg, niewydolność wątroby (AST/ALT ×3), nerek, niedokrwistość, neutropenia","Działania niepożądane":"pp (biegunka/wymioty), wypadanie sierści, uszkodzenie nerek, niedokrwistość aplastyczna, neutropenia, ↑ALT/AST, senność, ↓apetytu, kaszel, ↑węzłów, obrzęk, tłuszczak"}},{"n":"oklacytynib","k":4,"g":"INHIBITORY KINAZ","p":{"Grupa":"inhibitor kinaz janusowych (JAK)","Mechanizm":"hamuje cytokiny zależne od JAK (IL-2, IL-4, IL-6)","Zastosowanie":"leczenie świądu w alergicznym/atopowym zapaleniu skóry u psów","Przeciwwskazania":"psy z immunosupresją, nowotworami, <1 roku, <3 kg","Działania niepożądane":"biegunka, wymioty, polidypsja, letarg, tłuszczaki, histiocytoma, zap. ucha, zap. pęcherza, ↑węzłów, agresja"}},{"n":"ilunocytynib","k":4,"g":"INHIBITORY KINAZ","p":{"Grupa":"inhibitor JAK","Mechanizm":"jw. — świąd, alergie, proces zapalny","Zastosowanie":"AZS","Przeciwwskazania":"jw. + psy z nużycą","Działania niepożądane":"biegunka, wymioty, apatia, brodawczaki, torbiele międzypalcowe"}},{"n":"atynwicytynib","k":4,"g":"INHIBITORY KINAZ","p":{"Grupa":"selektywny inhibitor JAK1","Mechanizm":"hamuje cytokiny → ↓ krwinek białych zw. ze stanem zapalnym","Zastosowanie":"AZS","Przeciwwskazania":"nadwrażliwość","Działania niepożądane":"biegunka, wymioty, anoreksja, apatia"}},{"n":"lokiwetmab","k":4,"g":"INHIBITORY KINAZ","p":{"Grupa":"przeciwciało monoklonalne (NIE jest inhibitorem kinaz, ale obok JAK)","Mechanizm":"psie przeciwciało przeciw IL-31 (cytokina świądu w AZS)","Zastosowanie":"atopowe zapalenie skóry","Działania niepożądane":"anafilaksja, obrzęk pyska, pokrzywka, wymioty, biegunki, drgawki"}},{"n":"cyklosporyna","k":4,"g":"Immunosupresyjne selektywne (limfocyty T/B)","p":{"Mechanizm":"hamuje aktywację limfocytów T → ↓ produkcji cytokin prozapalnych (gł. IL-2); hamuje wzrost limf. B, degranulację bazofili/eozynofili; hamuje podziały naskórka","Zastosowanie":"zapobieganie odrzucaniu przeszczepów, rybia łuska, AZS , pęcherzyca, łysienie plackowate, suche zap. spojówki i rogówki","Przeciwwskazania":"cukrzyca, chore nerki, ciąża, laktacja, FeLV, FIV, psy <6 mż lub <2 kg","Działania niepożądane":"toksoplazmoza, przerost dziąseł, nefro-, hepatotoksyczność, zakrzepy, wymioty, biegunki, ↑ podatność na infekcje","Dodatkowe":"wysokie stężenie w skórze; podawać na czczo; łączona z inhibitorami P450 (taniej)"}},{"n":"azatiopryna","k":4,"g":"Immunosupresyjne selektywne (limfocyty T/B)","p":{"Mechanizm":"uwalnia 6-merkaptopurynę → antymetabolit zasad purynowych → zaburza syntezę DNA, blokuje proliferację limfocytów","Zastosowanie":"toczeń rumieniowaty układowy, ciężkie RZS","Przeciwwskazania":"leukopenia, ciąża, laktacja","Działania niepożądane":"hepato-, mielotoksyczność, ryzyko zap. trzustki","Dodatkowe":"dodawana do GKS; NIE U KOTÓW!"}},{"n":"mykofenolan mofetylu (MM)","k":4,"g":"Immunosupresyjne selektywne (limfocyty T/B)","p":{"Mechanizm":"prolek → kwas mykofenolowy → hamuje dehydrogenazę monofosforanu inozyny (izoforma II w szybko dzielących się komórkach, m.in. limfocytach) → hamuje proliferację limf. T i B","Zastosowanie":"transplantologia, IMHA, kłębuszkowe zap. nerek, miastenia, łuszczyca, zap. naczyń, wrzodziejące zap. okrężnicy","Przeciwwskazania":"laktacja","Działania niepożądane":"biegunki, supresja szpiku, apatia, podatność na zakażenia, kancerogenny","Dodatkowe":"ostrożnie u kotów"}},{"n":"pentoksyfilina","k":4,"g":"Immunosupresyjne selektywne (limfocyty T/B)","p":{"Mechanizm":"metyloksantyna; inhibitor fosfodiesteraz → ↑ cAMP/cGMP w komórce","Zastosowanie":"toczeń, AZS, zapalenia naczyń, alergie kontaktowe, czyraki międzypalcowe, łojotok","Przeciwwskazania":"przebyty krwotok mózgowy/siatkówkowy","Działania niepożądane":"zaburzenia pp, pobudzenie OUN, rumień u koni, fascykulacje"}},{"n":"parapoxvirus ovis","k":4,"g":"IMMUNOMODULATORY — stymulujące odporność","p":{"Grupa":"adiuwanty wirusowe","Mechanizm":"nieswoiście stymuluje odporność wrodzoną: aktywuje fagocyty, proliferację limfocytów, produkcję IFN, kom. NK","Zastosowanie":"profilaktyka i leczenie chorób infekcyjnych, stres (NIE prowadzi do wyleczenia)","Działania niepożądane":"obrzęk w miejscu, nadwrażliwość, kolka u koni"}},{"n":"propionibacterium (cutibacterium)","k":4,"g":"IMMUNOMODULATORY — stymulujące odporność","p":{"Grupa":"inaktywowane bakterie","Mechanizm":"nieswoiście stymuluje odporność wrodzoną: aktywuje fagocyty, proliferację limfocytów, produkcję IFN, kom. NK","Zastosowanie":"ogranicza śmiertelność w chorobie Mareka, Gumboro, białaczce drobiu; PRRS, choroba Aujeszkyego, dyzenteria świń","Działania niepożądane":"brak / ból w iniekcji, ↑ temperatury"}},{"n":"mieszanina inaktywowanych bakterii","k":4,"g":"IMMUNOMODULATORY — stymulujące odporność","p":{"Grupa":"inaktywowane bakterie","Mechanizm":"antygeny → stymulacja swoistej i nieswoistej odpowiedzi komórkowej, ↑ fagocytoza","Zastosowanie":"profilaktyka w niedostatecznej odporności, mieszane infekcje DO, układu rozrodczego","Działania niepożądane":"przejściowe nasilenie objawów, ↑ temperatury"}},{"n":"β-1,3/1,6-glukan z S. cerevisiae","k":4,"g":"IMMUNOMODULATORY — stymulujące odporność","p":{"Mechanizm":"rozpoznawany przez makrofagi/neutrofile/kom. dendrytyczne → ↑ fagocytoza + produkcja IL-1, IL-6, TNF-α"}},{"n":"pegbowigrastym","k":4,"g":"IMMUNOMODULATORY — stymulujące odporność","p":{"Grupa":"bG-CSF","Mechanizm":"↑ liczba i aktywność neutrofilów krążących","Zastosowanie":"pomocniczo w programie zarządzania stadem — ↓ ryzyka klinicznego zap. gruczołu mlekowego u krów okołoporodowych","Działania niepożądane":"anafilaksja, obrzęk błon śluzowych, przyspieszony oddech, ślinotok"}},{"n":"dimer lizozymu","k":4,"g":"IMMUNOMODULATORY — stymulujące odporność","p":{"Mechanizm":"białko przeciwbakteryjne i przeciwwirusowe → ↑ fagocytoza, proliferacja limf. T i B, ↑ IL-2, IL-6","Zastosowanie":"wspomagająco w infekcjach bakteryjnych/wirusowych pp, dróg odd., skóry, ucha"}},{"n":"lewamizol","k":4,"g":"IMMUNOMODULATORY — stymulujące odporność","p":{"Grupa":"lek przeciwpasożytniczy = tymomimetyk","Mechanizm":"działanie immunorekonstrukcyjne na limf. T, stymuluje fagocytozę, normalizuje cytokiny","Zastosowanie":"toczeń rumieniowaty (wspomag.), niektóre nowotwory","Działania niepożądane":"wymioty, biegunki, neurotoksyczność (NIE u koni!), anemia hemolityczna, agranulocytoza, zmiany skórne"}},{"n":"kocia interleukina-2","k":4,"g":"IMMUNOMODULATORY — stymulujące odporność","p":{"Grupa":"rekombinant wirusa canarypox","Mechanizm":"ekspresja kociej IL-2 w miejscu inokulacji → lokalna stymulacja odporności przeciwnowotworowej","Zastosowanie":"immunoterapia, uzupełnienie radioterapii, ↓ ryzyka nawrotu","Działania niepożądane":"miejscowo ból, świąd, apatia, gorączka"}},{"n":"cyprofloksacyna","k":4,"g":"Okulistyka: antybiotyki","p":{"Grupa":"fluorochinolony","Mechanizm":"hamują topoizomerazę II (gyraza DNA) i IV → ↓ replikacji DNA","Zastosowanie":"poważne zakażenia bakteryjne, zap. rogówki, zakażenia wewnątrzgałkowe, wrzody rogówki","Przeciwwskazania":"młode psy/koty/konie, ciąża, laktacja, padaczka","Działania niepożądane":"uszkodzenie chrząstek stawowych u młodych, pp, degeneracja siatkówki u kotów"}},{"n":"chloramfenikol","k":4,"g":"Okulistyka: antybiotyki","p":{"Grupa":"fenikole","Mechanizm":"hamuje 50S rybosom → synteza białka","Zastosowanie":"bakteryjne zap. spojówek, powiek, niewrzodziejące i wrzodziejące zap. rogówki","Przeciwwskazania":"choroby wątroby","Działania niepożądane":"stany zapalne pp, wymioty u mięsożernych, niedokrwistość aplastyczna (szpik)"}},{"n":"gentamycyna, tobramycyna","k":4,"g":"Okulistyka: antybiotyki","p":{"Grupa":"aminoglikozydy","Mechanizm":"wiązanie z podjednostką 30S → blok translacji","Zastosowanie":"bakteryjne zakażenia rogówki","Przeciwwskazania":"zaburzenia nerek","Działania niepożądane":"oto-, nefrotoksyczność, blok nerwowo-mięśniowy, hipomagnezemia"}},{"n":"bacytracyna, gramicydyna, polimyksyna B","k":4,"g":"Okulistyka: antybiotyki","p":{"Grupa":"polimyksyny i peptydowe","Mechanizm":"kationowe związki amfipatyczne → zakłócają fosfolipidy błony bakteryjnej (wypierają Ca²⁺/Mg²⁺) → rozpad komórki","Zastosowanie":"powierzchowne wrzody rogówki","Przeciwwskazania":"choroby nerek","Działania niepożądane":"uszkodzenie nerek"}},{"n":"kwas fusydowy","k":4,"g":"Okulistyka: antybiotyki","p":{"Mechanizm":"blokuje biosyntezę białka","Zastosowanie":"zakażenia bakteryjne powiek i spojówki","Działania niepożądane":"reakcje alergiczne"}},{"n":"timolol","k":4,"g":"Okulistyka: JASKRA — obniżenie ciśnienia śródgałkowego","p":{"Grupa":"nieselektywne β-adrenolityki","Mechanizm":"blokada rec. β w ciele rzęskowym → ↓ cAMP → ↓ wydzielania jonów i wody → ↓ produkcji cieczy wodnistej","Działania niepożądane":"bradykardia, niemiarowość, ↓ ciśnienia, niewydolność wieńcowa, niedokrwienie mózgu i kończyn, skurcz oskrzeli, bóle głowy"}},{"n":"sympatykolityki","k":4,"g":"Okulistyka: JASKRA — obniżenie ciśnienia śródgałkowego","p":{"Grupa":"blokery rec. β","Mechanizm":"↓ produkcji cieczy wodnistej (bezpośrednio przez nabłonek rzęskowy + pośrednio przez naczynia)"}},{"n":"dorzolamid","k":4,"g":"Okulistyka: JASKRA — obniżenie ciśnienia śródgałkowego","p":{"Grupa":"inhibitory anhydrazy węglanowej","Mechanizm":"↓ aktywności anhydrazy w nabłonku barwnikowym → ↓ jonów dwuwęglanowych → ↓ produkcji cieczy wodnistej; działanie moczopędne","Działania niepożądane":"zap. spojówek, ubytki nabłonka rogówki, gorzki smak, pogorszenie widzenia, bóle głowy, osłabienie"}},{"n":"pilokarpina","k":4,"g":"Okulistyka: JASKRA — obniżenie ciśnienia śródgałkowego","p":{"Grupa":"parasympatykomimetyki","Mechanizm":"otwarcie kąta przesączania + poprawa odpływu konwencjonalnego"}},{"n":"amlodypina","k":4,"g":"Okulistyka: JASKRA — obniżenie ciśnienia śródgałkowego","p":{"Grupa":"antagoniści kanałów Ca²⁺","Mechanizm":"neuroprotekcja: pośrednio (wazodylatacja → normalizacja mikrokrążenia siatkówki) + bezpośrednio (↓ Ca²⁺ wewnątrzkomórkowego)","Działania niepożądane":"hipotensja, osłabienie kurczliwości serca"}},{"n":"karprofen, meloksykam, ketoprofen, ASA","k":4,"g":"Okulistyka: NLPZ + inhibitory metaloproteinaz","p":{"Grupa":"NLPZ","Mechanizm":"hamują COX-2 → ↓ prostaglandyn (mediatorów zapalenia i bólu)","Zastosowanie":"infekcyjne zap. spojówek, końcowy okres leczenia wrzodu rogówki, operacja zaćmy, zap. tęczówki/ciała rzęskowego (z GKS)","Przeciwwskazania":"krwotoki do komory przedniej","Działania niepożądane":"↓ agregacji płytek"}},{"n":"N-acetylocysteina + tetracykliny","k":4,"g":"Okulistyka: NLPZ + inhibitory metaloproteinaz","p":{"Grupa":"inhibitory metaloproteinaz (IMP)","Mechanizm":"acetylocysteina bogata w grupy -SH wiąże nieodwracalnie Zn²⁺ w centrach aktywnych MMPs → unieczynnia","Zastosowanie":"owrzodzenia rogówki","Przeciwwskazania":"niewydolność nerek, zaburzenia wątroby","Działania niepożądane":"nefro-, hepatotoksyczne, pp, nadwrażliwość na światło, reakcje alergiczne"}}];

const ACCENTS = {1:"#8e44ad", 2:"#c0392b", 3:"#16a085", 4:"#d68910", 0:"#2980b9"};
const KOL_NAME = {1:"Kolokwium 1", 2:"Kolokwium 2", 3:"Kolokwium 3", 4:"Kolokwium 4"};

let filter = 0;
let pool = [];
let current = null;
let revealed = false;
let lastIdx = -1;

function buildPool() {
  pool = filter === 0 ? LEKI.slice() : LEKI.filter(d => d.k === filter);
}

function draw() {
  if (pool.length === 0) { renderEmpty(); return; }
  let idx;
  do { idx = Math.floor(Math.random() * pool.length); }
  while (pool.length > 1 && idx === lastIdx);
  lastIdx = idx;
  current = pool[idx];
  revealed = false;
  render();
}

function renderEmpty() {
  document.getElementById("cardWrap").innerHTML =
    '<div class="empty">Brak leków dla tego filtra.</div>';
  document.getElementById("counter").textContent = "";
}

function render() {
  const accent = ACCENTS[current.k] || ACCENTS[0];
  const propsHtml = Object.entries(current.p)
    .map(([k, v]) => `<div class="prop"><b>${esc(k)}</b>${esc(v)}</div>`)
    .join("");

  document.getElementById("cardWrap").innerHTML = `
    <div class="card" style="--accent:${accent}">
      <div class="card-head">
        <span class="badge">${KOL_NAME[current.k]}</span>
        <h2 class="drug-name">${esc(current.n)}</h2>
        ${current.g ? `<div class="drug-sub">${esc(current.g)}</div>` : ""}
      </div>
      <div class="reveal-hint ${revealed ? "hidden" : ""}">Co wiesz o tym leku? Kliknij „Pokaż odpowiedź".</div>
      <div class="answer ${revealed ? "" : "hidden"}">${propsHtml}</div>
    </div>`;

  document.getElementById("counter").textContent =
    `${pool.length} leków w puli` + (filter ? ` · ${KOL_NAME[filter]}` : "");
  document.getElementById("revealBtn").textContent = revealed ? "Ukryj odpowiedź" : "Pokaż odpowiedź";
}

function toggleReveal() {
  if (!current) return;
  revealed = !revealed;
  render();
}

function esc(s) {
  return String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
}

document.getElementById("revealBtn").addEventListener("click", toggleReveal);
document.getElementById("nextBtn").addEventListener("click", draw);

document.getElementById("filters").addEventListener("click", e => {
  const b = e.target.closest(".filter");
  if (!b) return;
  document.querySelectorAll(".filter").forEach(x => x.classList.remove("active"));
  b.classList.add("active");
  filter = parseInt(b.dataset.k, 10);
  buildPool();
  lastIdx = -1;
  draw();
});

document.addEventListener("keydown", e => {
  if (e.code === "Space") { e.preventDefault(); revealed ? draw() : toggleReveal(); }
  else if (e.code === "ArrowRight") { e.preventDefault(); draw(); }
});

buildPool();
draw();
</script>
</body>
</html>
